  showToast('备份文件已下载');
}
function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const backup = JSON.parse(ev.target.result);
        if (typeof backup !== 'object') throw new Error('格式不正确');
        ['exam_progress', 'exam_bank', 'exam_settings', 'exam_notes', 'exam_qstats', 'exam_pomodoro', 'exam_reports', 'exam_qtags'].forEach(key => {
          if (backup[key]) {
            _dataCache[key] = backup[key];
            scheduleSave(key);
          }
        });
        showToast('备份恢复成功，正在刷新…');
        setTimeout(() => location.reload(), 800);
      } catch(err) {
        showToast('导入失败：' + (err.message || '格式不正确'));
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// === ROUND 8: Pomodoro Timer ===
let POMODORO = { interval: null, running: false, phase: 'work', remaining: 25 * 60, workMin: 25, breakMin: 5 };
function getPomodoroCount() {
  const data = _dataCache['exam_pomodoro'] || {};
  const today = new Date().toISOString().slice(0, 10);
  return data[today] || 0;
}
function addPomodoroCount() {
  const data = _dataCache['exam_pomodoro'] || {};
  const today = new Date().toISOString().slice(0, 10);
  data[today] = (data[today] || 0) + 1;
  _dataCache['exam_pomodoro'] = data;
  scheduleSave('exam_pomodoro');
}
function showPomodoroTimer() {
  if (POMODORO.interval) { clearInterval(POMODORO.interval); POMODORO.interval = null; }
  POMODORO.running = false;
  POMODORO.phase = 'work';
  POMODORO.remaining = POMODORO.workMin * 60;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'pomodoro-overlay';

  function renderPomodoro() {
    const totalSec = POMODORO.phase === 'work' ? POMODORO.workMin * 60 : POMODORO.breakMin * 60;
    const pct = totalSec > 0 ? POMODORO.remaining / totalSec : 0;
    const circ = 2 * Math.PI * 85;
    const offset = circ * (1 - pct);
    const ringColor = POMODORO.phase === 'work' ? '#ef4444' : '#22c55e';
    const min = Math.floor(POMODORO.remaining / 60);
    const sec = POMODORO.remaining % 60;
    const timeStr = String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    const todayCount = getPomodoroCount();

    overlay.innerHTML = `
    <div class="modal-box" style="max-width:420px">
      <div class="modal-title">
        <span>&#127813; 番茄钟</span>
        <button class="modal-close">&times;</button>
      </div>
      <div class="pomodoro-display">
        <div class="pomodoro-circle">
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="85" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="100" cy="100" r="85" fill="none" stroke="${ringColor}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="pomodoro-circle-text">
            <div class="pomodoro-time" style="color:${ringColor}">${timeStr}</div>
            <div class="pomodoro-phase">${POMODORO.phase === 'work' ? '专注中' : '休息中'}</div>
          </div>
        </div>
        <div class="pomodoro-controls">
          <button class="btn btn-sm ${POMODORO.running ? '' : 'btn-primary'}" id="pomo-start">${POMODORO.running ? '⏸ 暂停' : '▶ 开始'}</button>
          <button class="btn btn-sm" id="pomo-reset">↻ 重置</button>
          <button class="btn btn-sm" id="pomo-skip">${POMODORO.phase === 'work' ? '跳到休息' : '跳到专注'}</button>
        </div>
        <div class="pomodoro-config">
          <label>专注 <input type="number" id="pomo-work" value="${POMODORO.workMin}" min="1" max="90"> 分钟</label>
          <label>休息 <input type="number" id="pomo-break" value="${POMODORO.breakMin}" min="1" max="30"> 分钟</label>
        </div>
        <div class="pomodoro-stats">&#127813; 今日完成番茄数：<strong>${todayCount}</strong></div>
      </div>
    </div>`;

    overlay.querySelector('.modal-close').addEventListener('click', () => {
      clearInterval(POMODORO.interval); POMODORO.interval = null; POMODORO.running = false;
      overlay.remove();
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        clearInterval(POMODORO.interval); POMODORO.interval = null; POMODORO.running = false;
        overlay.remove();
      }
    });

    overlay.querySelector('#pomo-start').addEventListener('click', () => {
      if (POMODORO.running) {
        clearInterval(POMODORO.interval); POMODORO.interval = null;
        POMODORO.running = false;
      } else {
        POMODORO.running = true;
        POMODORO.interval = setInterval(() => {
          POMODORO.remaining--;
          if (POMODORO.remaining <= 0) {
            clearInterval(POMODORO.interval); POMODORO.interval = null;
            POMODORO.running = false;
            playSound('pomodoroComplete');
            if (POMODORO.phase === 'work') {
              addPomodoroCount();
              POMODORO.phase = 'break';
              POMODORO.remaining = POMODORO.breakMin * 60;
            } else {
              POMODORO.phase = 'work';
              POMODORO.remaining = POMODORO.workMin * 60;
            }
          }
          renderPomodoro();
        }, 1000);
      }
      renderPomodoro();
    });

    overlay.querySelector('#pomo-reset').addEventListener('click', () => {
      clearInterval(POMODORO.interval); POMODORO.interval = null;
      POMODORO.running = false;
      POMODORO.phase = 'work';
      POMODORO.remaining = POMODORO.workMin * 60;
      renderPomodoro();
    });

    overlay.querySelector('#pomo-skip').addEventListener('click', () => {
      clearInterval(POMODORO.interval); POMODORO.interval = null;
      POMODORO.running = false;
      if (POMODORO.phase === 'work') {
        POMODORO.phase = 'break';
        POMODORO.remaining = POMODORO.breakMin * 60;
      } else {
        POMODORO.phase = 'work';
        POMODORO.remaining = POMODORO.workMin * 60;
      }
      renderPomodoro();
    });

    overlay.querySelector('#pomo-work').addEventListener('change', (e) => {
      const v = Math.max(1, Math.min(90, parseInt(e.target.value) || 25));
      POMODORO.workMin = v;
      if (POMODORO.phase === 'work' && !POMODORO.running) {
        POMODORO.remaining = v * 60;
        renderPomodoro();
      }
    });
    overlay.querySelector('#pomo-break').addEventListener('change', (e) => {
      const v = Math.max(1, Math.min(30, parseInt(e.target.value) || 5));
      POMODORO.breakMin = v;
      if (POMODORO.phase === 'break' && !POMODORO.running) {
        POMODORO.remaining = v * 60;
        renderPomodoro();
      }
    });
  }

  document.body.appendChild(overlay);
  renderPomodoro();
}

// === ROUND 8: Question Statistics ===
function getQuestionStats() {
  return _dataCache['exam_qstats'] || {};
}
function updateQuestionStats(qId, correct) {
  const stats = getQuestionStats();
  if (!stats[qId]) stats[qId] = { seen: 0, correct: 0, wrong: 0 };
  stats[qId].seen++;
  if (correct) stats[qId].correct++;
  else stats[qId].wrong++;
  _dataCache['exam_qstats'] = stats;
  scheduleSave('exam_qstats');
}
function getQStatDisplay(qId) {
  const stats = getQuestionStats();
  const s = stats[qId];
  if (!s || s.seen === 0) return '';
  const pct = Math.round(s.correct / s.seen * 100);
  const cls = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad';
  return '<div class="q-stats-indicator">正确率: <span class="' + cls + '">' + pct + '%</span> (' + s.correct + '/' + s.seen + ')</div>';
}

// === ROUND 9: Weak Topic Analysis ===
function analyzeWeakTopics() {
  const bank = APP.bank;
  const qstats = getQuestionStats();
  const data = getStorage();
  const wrongBook = data.wrongBook || [];
  const chapterErrors = {};
  // Group from qstats
  bank.chapters.forEach((ch, ci) => {
    const key = ch.name;
    if (!chapterErrors[key]) chapterErrors[key] = { total: 0, wrong: 0, questions: [] };
    ch.questions.forEach(q => {
      const s = qstats[q.id];
      if (s && s.seen > 0) {
        chapterErrors[key].total += s.seen;
        chapterErrors[key].wrong += s.wrong;
      }
    });
  });
  // Also count from wrongBook
  wrongBook.forEach(w => {
    const cn = w.chapterName || '未知';
    if (!chapterErrors[cn]) chapterErrors[cn] = { total: 0, wrong: 0, questions: [] };
  });
  // Build chapter error rates
  const chapterRates = Object.entries(chapterErrors).map(([name, d]) => ({
    name,
    errorRate: d.total > 0 ? Math.round(d.wrong / d.total * 100) : 0,
    total: d.total,
    wrong: d.wrong
  })).sort((a, b) => b.errorRate - a.errorRate);
  // Top 5 most-missed questions
  const allMissed = [];
  bank.chapters.forEach(ch => {
    ch.questions.forEach(q => {
      const s = qstats[q.id];
      if (s && s.seen > 0) {
        const acc = Math.round(s.correct / s.seen * 100);
        allMissed.push({ id: q.id, question: q.question, acc, seen: s.seen, wrong: s.wrong, chName: ch.name });
      }
    });
  });
  allMissed.sort((a, b) => a.acc - b.acc);
  const top5 = allMissed.slice(0, 5);
  // Weak questions: accuracy < 50%
  const weakQs = allMissed.filter(q => q.acc < 50);
  return { chapterRates, top5, weakQs };
}

function startWeakPractice() {
  const analysis = analyzeWeakTopics();
  const weakIds = analysis.weakQs.map(w => w.id);
  if (weakIds.length === 0) {
    showToast('没有找到薄弱题目（正确率<50%），继续加油！');
    return;
  }
  const bank = APP.bank;
  const pool = [];
  bank.chapters.forEach(ch => {
    ch.questions.forEach(q => {
      if (weakIds.includes(q.id)) pool.push({...q, _chapterName: ch.name});
    });
  });
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  APP.currentChapter = -5;
  APP.dailyQuestions = pool.slice(0, Math.min(10, pool.length));
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.timedMode = false;
  startTimer();
  renderExam();
}

}

}

  a.href = url;
  a.download = 'review_annotations_' + new Date().toISOString().slice(0, 10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('复习批注已导出');
}

// === AUTH SCREEN FUNCTIONS ===
function showAuthScreen() {
  const el = document.getElementById('auth-screen');
  if (el) el.style.display = 'flex';
  const splash = document.getElementById('splash');
  if (splash) splash.style.display = 'none';
}
function hideAuthScreen() {
  const el = document.getElementById('auth-screen');
  if (el) el.style.display = 'none';
}

// Auth form wiring
(function wireAuth() {
  let mode = 'login'; // 'login' | 'register'
  const tabLogin = document.getElementById('auth-tab-login');
  const tabRegister = document.getElementById('auth-tab-register');
  const confirmRow = document.getElementById('auth-confirm-row');
  const submitBtn = document.getElementById('auth-submit');
  const form = document.getElementById('auth-form');
  const errorEl = document.getElementById('auth-error');

  function setMode(m) {
    mode = m;
    if (m === 'login') {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      confirmRow.classList.remove('show');
      submitBtn.textContent = '登录';
    } else {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      confirmRow.classList.add('show');
      submitBtn.textContent = '注册';
    }
    errorEl.textContent = '';
  }

  tabLogin?.addEventListener('click', () => setMode('login'));
  tabRegister?.addEventListener('click', () => setMode('register'));

  form?.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;

    if (!email || !password) { errorEl.textContent = '请填写邮箱和密码'; return; }

    if (mode === 'register') {
      const confirm = document.getElementById('auth-confirm').value;
      if (password !== confirm) { errorEl.textContent = '两次密码输入不一致'; return; }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = mode === 'login' ? '登录中…' : '注册中…';
    try {
      const endpoint = mode === 'login' ? '/api/login' : '/api/register';
      const result = await apiCall('POST', endpoint, { email, password });
      setAuthToken(result.token);
      await loadAllUserData();
      hideAuthScreen();
      initTheme();
      initBank();
      initAccentTheme();
      render();
      startCountdownInterval();
    } catch(err) {
      errorEl.textContent = err.message === 'unauthorized' ? '认证失败' : (err.message || '操作失败');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = mode === 'login' ? '登录' : '注册';
    }
  });
})();

// === INIT ===
async function bootApp() {
  const token = getAuthToken();
  if (!token) { showAuthScreen(); return; }
  try {
    await apiCall('GET', '/api/me');
    await loadAllUserData();
  } catch(e) {
    showAuthScreen();
    return;
  }
  hideAuthScreen();
  initTheme();
  initBank();
  initAccentTheme();
  render();
  startCountdownInterval();
}
bootApp();

// Splash screen dismiss
setTimeout(() => {
  const appEl = document.getElementById('app');
  if (appEl) {
    appEl.style.opacity = '1';
    appEl.style.transition = 'opacity 0.4s ease';
  }
  const splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hide');
    setTimeout(() => { if (splash.parentNode) splash.remove(); }, 700);
  }
}, 1600);
// Fallback: ensure splash is removed even if something goes wrong
setTimeout(() => {
  const splash = document.getElementById('splash');
  if (splash && splash.parentNode) splash.remove();
  const appEl = document.getElementById('app');
  if (appEl) appEl.style.opacity = '1';
}, 3000);
</script>
