<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大钦智能刷题 v1.0 — 每日模拟练习平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2234;
  --bg-card-hover: #1f2a40;
  --bg-input: #0d1220;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #5a6478;
  --accent: #f97316;
  --accent-glow: rgba(249,115,22,0.25);
  --accent-secondary: #fb923c;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --yellow: #eab308;
  --yellow-bg: rgba(234,179,8,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.5);
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Playfair Display', serif;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-primary: #f5f0eb;
  --bg-secondary: #ebe5dd;
  --bg-card: #ffffff;
  --bg-card-hover: #faf7f4;
  --bg-input: #f0ebe4;
  --text-primary: #1a1a2e;
  --text-secondary: #6b7084;
  --text-muted: #9ca0ad;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.12);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
button, .btn, .nav-btn, .q-pill, .q-option, .filter-btn, .tab-btn, .mode-card, .chapter-card,
.num-option, .time-option, .toggle-switch, .accent-option, .tag-filter-chip, .q-tag-add,
.import-format-tab, .section-action, .explorer-toggle, .q-bookmark, .q-report-btn,
.random-practice-card, .shortcut-help-btn, .countdown-set-btn, .history-detail-btn,
.pomodoro-dashboard-btn, .import-zone { cursor: pointer; }
.q-pill, .q-option-letter, .tab-btn, .filter-btn, .mode-card-icon, .mode-card-title,
.toggle-switch, .q-bookmark, .btn, .nav-btn, .chapter-status, .kbd-hints,
.q-note-section-header { user-select: none; -webkit-user-select: none; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* === Ambient background === */
body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(249,115,22,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 60%);
  z-index: 0;
  pointer-events: none;
  animation: ambientDrift 30s ease-in-out infinite alternate;
}
@keyframes ambientDrift {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(-3%,-3%) rotate(3deg); }
}

#app { position: relative; z-index: 1; }

/* === Top navigation === */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(10,14,23,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
[data-theme="light"] .top-nav { background: rgba(245,240,235,0.85); }

.nav-brand {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.nav-brand-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900;
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.nav-brand-text {
  font-size: 1.15rem; font-weight: 700;
  letter-spacing: -0.02em;
}
.nav-brand-sub {
  font-size: 0.72rem; color: var(--text-muted);
  font-weight: 400; letter-spacing: 0.04em;
}

.nav-actions { display: flex; align-items: center; gap: 12px; }
.nav-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all var(--transition);
}
.nav-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
}
.nav-btn-text {
  width: auto; padding: 0 16px;
  font-size: 0.82rem; font-weight: 500;
  gap: 6px; font-family: var(--font-body);
}

/* === Page containers === */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 32px 80px;
  animation: pageIn 0.5s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === Dashboard hero === */
.hero {
  text-align: center;
  padding: 48px 0 40px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 3.2rem; font-weight: 900;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
}
.hero-sub {
  margin-top: 12px;
  font-size: 1.05rem; color: var(--text-secondary);
  font-weight: 300;
}
.hero-day {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px; padding: 8px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 100px;
  font-size: 0.88rem; color: var(--text-secondary);
  font-family: var(--font-mono);
}
.hero-day-num {
  font-weight: 700; color: var(--accent);
  font-size: 1.1rem;
}

/* === Stats row === */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.stat-card {
  padding: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
}
.stat-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
.stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.stat-value {
  font-size: 2rem; font-weight: 900;
  font-family: var(--font-mono);
  margin-top: 8px;
  line-height: 1;
  display: inline-block;
  transition: transform 0.2s ease;
}
.stat-value.accent { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.blue { color: var(--blue); }
.stat-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

/* === Section headers === */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-size: 1.2rem; font-weight: 700;
  letter-spacing: -0.01em;
}
.section-action {
  font-size: 0.82rem; color: var(--accent);
  cursor: pointer; font-weight: 500;
  border: none; background: none;
  font-family: var(--font-body);
  transition: opacity var(--transition);
}
.section-action:hover { opacity: 0.7; }

/* === Chapter cards === */
.chapters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}
.chapter-card {
  position: relative;
  padding: 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all var(--transition);
  overflow: hidden;
}
.chapter-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  opacity: 0;
  transition: opacity var(--transition);
}
.chapter-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.chapter-card:hover::before { opacity: 1; }
.chapter-num {
  font-family: var(--font-mono);
  font-size: 0.72rem; font-weight: 600;
  color: var(--accent); letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.chapter-name {
  font-size: 1.15rem; font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.chapter-info {
  font-size: 0.82rem; color: var(--text-secondary);
  margin-bottom: 16px;
}
.chapter-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.chapter-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem; font-weight: 500;
}
.chapter-status.done { color: var(--green); }
.chapter-status.pending { color: var(--yellow); }
.chapter-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
}
.chapter-score {
  font-family: var(--font-mono);
  font-size: 0.88rem; font-weight: 600;
  color: var(--text-muted);
}

/* === Calendar === */
.calendar-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 48px;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  margin-top: 16px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 600;
  font-family: var(--font-mono);
  transition: all var(--transition);
  position: relative;
}
.cal-cell.today {
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
.cal-cell.completed {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}
.cal-cell.partial {
  background: var(--yellow-bg);
  border-color: var(--yellow);
  color: var(--yellow);
}
.cal-cell-day { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 2px; }

/* === Import section === */
.import-zone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 48px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 48px;
}
.import-zone:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.import-icon { font-size: 2.5rem; margin-bottom: 12px; }
.import-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
.import-sub { font-size: 0.82rem; color: var(--text-muted); }

/* === Bank Management === */
.bank-manager { margin-bottom: 48px; }
.bank-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
.bank-tab { padding: 10px 20px; background: none; border: none; color: var(--text-secondary); font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all var(--transition); }
.bank-tab:hover { color: var(--text); }
.bank-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.bank-upload-area { border: 2px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 32px; text-align: center; cursor: pointer; transition: all var(--transition); margin-bottom: 16px; }
.bank-upload-area:hover { border-color: var(--accent); background: var(--accent-glow); }
.bank-upload-area.drag-over { border-color: var(--accent); background: var(--accent-glow); }
.bank-upload-icon { font-size: 2rem; margin-bottom: 8px; }
.bank-upload-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
.bank-upload-sub { font-size: 0.78rem; color: var(--text-muted); }
.bank-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.bank-form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.bank-form-input { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--bg-card); color: var(--text); font-size: 0.9rem; }
.bank-form-input:focus { outline: none; border-color: var(--accent); }
.bank-share-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; user-select: none; }
.bank-share-toggle input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }
.bank-submit-btn { padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity var(--transition); }
.bank-submit-btn:hover { opacity: 0.85; }
.bank-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.bank-list { display: flex; flex-direction: column; gap: 10px; }
.bank-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); transition: all var(--transition); }
.bank-item:hover { border-color: var(--accent); }
.bank-item-info { flex: 1; min-width: 0; }
.bank-item-name { font-weight: 600; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bank-item-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
.bank-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.bank-item-btn { padding: 6px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: none; color: var(--text-secondary); font-size: 0.78rem; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
.bank-item-btn:hover { border-color: var(--accent); color: var(--accent); }
.bank-item-btn.danger:hover { border-color: var(--red); color: var(--red); }
.bank-item-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.bank-item-btn.primary:hover { opacity: 0.85; }
.bank-item-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.bank-item-badge.public { background: rgba(16,185,129,0.15); color: var(--green); }
.bank-item-badge.private { background: rgba(156,163,175,0.15); color: var(--text-muted); }
.bank-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }
.bank-progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.bank-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
.import-input { display: none; }

/* === Exam page === */
.exam-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.exam-chapter-label {
  font-size: 0.75rem; color: var(--accent);
  font-family: var(--font-mono); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.exam-title { font-size: 1.3rem; font-weight: 700; margin-top: 4px; }
.exam-meta {
  display: flex; align-items: center; gap: 20px;
}
.exam-timer {
  font-family: var(--font-mono);
  font-size: 1.1rem; font-weight: 600;
  color: var(--accent);
  display: flex; align-items: center; gap: 6px;
}
.exam-progress-text {
  font-size: 0.82rem; color: var(--text-secondary);
  font-family: var(--font-mono);
}

/* === Question nav pills === */
.q-nav {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 32px;
  padding: 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.q-pill {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.q-pill:hover { border-color: var(--text-muted); }
.q-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.q-pill.answered {
  background: var(--blue-bg);
  border-color: var(--blue);
  color: var(--blue);
}
.q-pill.flagged {
  background: var(--yellow-bg);
  border-color: var(--yellow);
  color: var(--yellow);
}
.q-pill.correct {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}
.q-pill.wrong {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
}

/* === Question card === */
.q-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 24px;
}
.q-type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}
.q-type-badge.single { background: var(--blue-bg); color: var(--blue); }
.q-type-badge.multi { background: rgba(139,92,246,0.12); color: #a78bfa; }
.q-type-badge.tf { background: var(--green-bg); color: var(--green); }
.q-type-badge.fill { background: var(--yellow-bg); color: var(--yellow); }

.q-text {
  font-size: 1.05rem; font-weight: 500;
  line-height: 1.7;
  margin-bottom: 24px;
}
.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.95rem;
  line-height: 1.5;
}
.q-option:hover { border-color: var(--text-muted); background: var(--bg-card-hover); }
.q-option.selected {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.q-option.correct-answer {
  border-color: var(--green) !important;
  background: var(--green-bg) !important;
}
.q-option.wrong-answer {
  border-color: var(--red) !important;
  background: var(--red-bg) !important;
}
.q-option-letter {
  min-width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.78rem; font-weight: 700;
  flex-shrink: 0;
  transition: all var(--transition);
}
.q-option.selected .q-option-letter {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.q-option.correct-answer .q-option-letter {
  border-color: var(--green);
  background: var(--green);
  color: #fff;
}
.q-option.wrong-answer .q-option-letter {
  border-color: var(--red);
  background: var(--red);
  color: #fff;
}
.q-option-text { padding-top: 3px; }

/* Fill input */
.q-fill-input {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color var(--transition);
}
.q-fill-input:focus { border-color: var(--accent); }

/* Explanation box */
.q-explanation {
  margin-top: 20px;
  padding: 20px;
  border-radius: var(--radius);
  border-left: 4px solid var(--accent);
  background: rgba(249,115,22,0.06);
}
.q-explanation-title {
  font-size: 0.82rem; font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.q-explanation-text {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-secondary);
}
.q-correct-note {
  margin-top: 10px;
  font-size: 0.85rem; font-weight: 600;
}
.q-correct-note.is-correct { color: var(--green); }
.q-correct-note.is-wrong { color: var(--red); }

/* === Exam bottom bar === */
.exam-actions {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.btn:hover { border-color: var(--text-muted); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ea580c);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow);
}
.btn-flag {
  background: var(--yellow-bg);
  border-color: var(--yellow);
  color: var(--yellow);
}
.btn-sm { padding: 8px 16px; font-size: 0.82rem; }

/* === Results page === */
.result-hero {
  text-align: center;
  padding: 48px 0;
}
.result-score {
  font-family: var(--font-display);
  font-size: 5rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
}
.result-label {
  font-size: 1.1rem; color: var(--text-secondary);
  margin-top: 8px;
}
.result-stats {
  display: flex; justify-content: center; gap: 40px;
  margin-top: 24px;
}
.result-stat { text-align: center; }
.result-stat-val {
  font-family: var(--font-mono);
  font-size: 1.5rem; font-weight: 700;
}
.result-stat-label {
  font-size: 0.78rem; color: var(--text-muted);
  margin-top: 2px;
}

/* === Responsive === */
@media (max-width: 768px) {
  .top-nav { padding: 12px 16px; }
  .page { padding: 24px 16px 60px; }
  .hero-title { font-size: 2rem; }
  .chapters-grid { grid-template-columns: 1fr; }
  .calendar-grid { grid-template-columns: repeat(6, 1fr); }
  .exam-header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .exam-meta { width: 100%; justify-content: space-between; }
  .q-card { padding: 20px; }
  .result-score { font-size: 3.5rem; }
  .result-stats { gap: 20px; }
  .exam-actions { flex-direction: column; }
  .exam-actions .btn { width: 100%; justify-content: center; }
}

/* === Utility animations === */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.4s ease both; }
.fade-up-1 { animation-delay: 0.05s; }
.fade-up-2 { animation-delay: 0.1s; }
.fade-up-3 { animation-delay: 0.15s; }
.fade-up-4 { animation-delay: 0.2s; }
.fade-up-5 { animation-delay: 0.25s; }

/* === Toast === */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 14px 28px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 0.88rem; font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 999;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* === Progress bar (exam top) === */
.exam-progress-bar {
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
}
.exam-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* === Confetti canvas === */
#confetti-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 1000;
}

/* === Keyboard hint === */
.kbd-hints {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-size: 0.75rem; color: var(--text-muted);
}
.kbd {
  display: inline-flex; align-items: center;
  padding: 2px 7px;
  background: var(--bg-input);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  margin-right: 4px;
  line-height: 1.4;
}
@media (max-width: 768px) {
  .kbd-hints { display: none; }
}

/* === Streak badge === */
.streak-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(234,179,8,0.15));
  border: 1px solid rgba(249,115,22,0.3);
  border-radius: 100px;
  font-size: 0.82rem; font-weight: 600;
  color: var(--accent);
}
.streak-fire { font-size: 1.1rem; }

/* === Error review mode === */
.error-filter-bar {
  display: flex; gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  padding: 6px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.78rem; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.filter-btn:hover:not(.active) { border-color: var(--text-muted); }

/* === Chapter history modal === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-box {
  width: 90%; max-width: 560px; max-height: 80vh;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 32px;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.4s ease;
}
.modal-title {
  font-size: 1.2rem; font-weight: 700;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all var(--transition);
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.history-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.history-row:last-child { border-bottom: none; }
.history-day { font-family: var(--font-mono); font-weight: 600; color: var(--text-muted); min-width: 60px; }
.history-date { color: var(--text-secondary); font-size: 0.78rem; }
.history-score { font-family: var(--font-mono); font-weight: 700; }
.history-score.good { color: var(--green); }
.history-score.mid { color: var(--yellow); }
.history-score.bad { color: var(--red); }

/* === Confirm dialog === */
.confirm-dialog {
  text-align: center;
  padding: 16px 0;
}
.confirm-dialog p {
  font-size: 1rem;
  margin-bottom: 8px;
}
.confirm-dialog .sub {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.confirm-actions {
  display: flex; gap: 12px; justify-content: center;
}

/* === Score ring (results) === */
.score-ring-wrap {
  position: relative;
  width: 180px; height: 180px;
  margin: 0 auto 16px;
}
.score-ring-wrap svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.score-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 8;
}
.score-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.5s ease;
}
.score-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-ring-pct {
  font-family: var(--font-display);
  font-size: 3rem; font-weight: 900;
  line-height: 1;
}
.score-ring-label {
  font-size: 0.78rem; color: var(--text-muted); margin-top: 4px;
}

/* === Wrong book (错题本) page === */
.wrong-book-empty {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.wrong-book-empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.wrong-book-q {
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.wrong-book-q:last-child { border-bottom: none; }
.wrong-book-q-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.wrong-book-q-ch {
  font-size: 0.7rem; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  background: var(--accent-glow); color: var(--accent);
}
.wrong-book-q-date {
  font-size: 0.72rem; color: var(--text-muted);
  font-family: var(--font-mono);
  margin-left: auto;
}

/* === Tab nav (dashboard) === */
.tab-nav {
  display: flex; gap: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 32px;
}
.tab-btn {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 0.88rem; font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* === Mini ring on chapter card === */
.chapter-mini-ring {
  position: absolute; top: 20px; right: 20px;
  width: 44px; height: 44px;
}
.chapter-mini-ring svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.chapter-mini-ring-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.62rem; font-weight: 700;
}

/* === Random practice mode === */
.random-practice-card {
  background: linear-gradient(135deg, var(--bg-card), rgba(249,115,22,0.06));
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 28px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 32px;
}
.random-practice-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.random-practice-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #ea580c);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; flex-shrink: 0;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.random-practice-title {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 4px;
}
.random-practice-sub {
  font-size: 0.82rem; color: var(--text-secondary);
}

/* === Drag-over state === */
.import-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: scale(1.01);
}

/* === Mobile bottom exam nav === */
@media (max-width: 768px) {
  .mobile-exam-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    z-index: 100;
    gap: 8px;
    backdrop-filter: blur(20px);
  }
  .mobile-exam-bar .btn { flex: 1; justify-content: center; }
  .page.has-mobile-bar { padding-bottom: 140px; }
}
@media (min-width: 769px) {
  .mobile-exam-bar { display: none; }
}

/* === Pulse dot for pending === */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.chapter-status.pending .chapter-status-dot {
  animation: pulse 2s ease-in-out infinite;
}

/* === Option select feedback animation === */
@keyframes optionPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
.q-option.just-selected {
  animation: optionPop 0.2s ease;
}

/* === Splash screen === */
.splash {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.splash.hide {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}
.splash-logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: 900; color: #fff;
  box-shadow: 0 8px 40px var(--accent-glow);
  animation: splashBounce 0.8s ease;
}
@keyframes splashBounce {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.1) rotate(2deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.splash-title {
  margin-top: 20px;
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 900;
  background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeUp 0.5s ease 0.3s both;
}
.splash-sub {
  margin-top: 8px;
  font-size: 0.85rem; color: var(--text-muted);
  animation: fadeUp 0.5s ease 0.5s both;
}
.splash-bar {
  width: 120px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 32px;
  overflow: hidden;
  animation: fadeUp 0.5s ease 0.6s both;
}
.splash-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  border-radius: 2px;
  animation: splashLoad 1s ease 0.7s both;
}
@keyframes splashLoad {
  from { width: 0; }
  to { width: 100%; }
}

/* === Accuracy bar chart === */
.acc-chart {
  display: flex; align-items: flex-end; gap: 6px;
  height: 80px;
  padding-top: 8px;
}
.acc-bar-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; height: 100%;
  justify-content: flex-end;
}
.acc-bar {
  width: 100%;
  max-width: 40px;
  border-radius: 4px 4px 0 0;
  transition: height 0.6s ease;
  min-height: 3px;
}
.acc-bar-label {
  font-size: 0.6rem; color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
  white-space: nowrap;
}
.acc-bar-val {
  font-size: 0.62rem; font-weight: 700;
  font-family: var(--font-mono);
  margin-bottom: 3px;
}

/* === Search bar === */
.search-bar {
  position: relative;
  margin-bottom: 20px;
}
.search-input {
  width: 100%;
  padding: 12px 18px 12px 42px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.9rem;
  pointer-events: none;
}

/* === Bookmark star === */
.q-bookmark {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.q-bookmark:hover { border-color: var(--yellow); color: var(--yellow); }
.q-bookmark.bookmarked {
  background: var(--yellow-bg);
  border-color: var(--yellow);
  color: var(--yellow);
}

/* === Today complete overlay === */
.today-complete-banner {
  background: linear-gradient(135deg, var(--green-bg), rgba(34,197,94,0.04));
  border: 1px solid var(--green);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 32px;
  animation: fadeUp 0.5s ease;
}
.today-complete-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}
.today-complete-title {
  font-size: 1rem; font-weight: 700; color: var(--green);
  margin-bottom: 2px;
}
.today-complete-sub {
  font-size: 0.82rem; color: var(--text-secondary);
}

/* === Touch swipe === */
.q-card-swipe { touch-action: pan-y; }

/* === Settings panel === */
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 0.9rem; }
.settings-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.toggle-switch {
  width: 44px; height: 24px;
  border-radius: 12px;
  background: var(--border-strong);
  position: relative;
  cursor: pointer;
  transition: background var(--transition);
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  transition: transform var(--transition);
}
.toggle-switch.on::after { transform: translateX(20px); }

/* === Number select === */
.num-select {
  display: flex; gap: 6px;
}
.num-option {
  width: 36px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.78rem; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.num-option:hover { border-color: var(--text-muted); }
.num-option.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* === Timed mode indicator === */
.timer-countdown {
  color: var(--red) !important;
  animation: timerPulse 1s ease-in-out infinite;
}
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.timer-warning { color: var(--yellow) !important; }
.timer-ok { color: var(--accent) !important; }

/* === Fullscreen overlay === */
.fullscreen-exam {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 200;
  overflow-y: auto;
}
.fullscreen-exam .page { max-width: 860px; }
.fullscreen-exit-btn {
  position: fixed; top: 16px; right: 16px;
  z-index: 210;
}

/* === Question Bank Explorer === */
.explorer-card {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
  cursor: default;
}
.explorer-card:hover { background: var(--bg-card-hover); }
.explorer-card:last-child { border-bottom: none; }
.explorer-q-text {
  font-size: 0.92rem;
  line-height: 1.6;
  margin: 8px 0;
}
.explorer-meta {
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
}
.explorer-opts {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 8px;
}
.explorer-opt {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.explorer-opt.is-answer {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-bg);
}
.explorer-collapse {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.explorer-collapse.open { max-height: 500px; }
.explorer-toggle {
  font-size: 0.78rem;
  color: var(--accent);
  cursor: pointer;
  border: none; background: none;
  font-family: var(--font-body);
  font-weight: 600;
  padding: 0;
  transition: opacity var(--transition);
}
.explorer-toggle:hover { opacity: 0.7; }

/* === Sparkline === */
.sparkline-wrap {
  height: 48px;
  display: flex; align-items: flex-end; gap: 2px;
  padding: 4px 0;
}
.spark-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  min-width: 4px;
  transition: height 0.4s ease;
  position: relative;
}
.spark-bar:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 4px); left: 50%;
  transform: translateX(-50%);
  padding: 2px 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.62rem;
  font-family: var(--font-mono);
  white-space: nowrap;
  z-index: 10;
  color: var(--text-primary);
}

/* === User notes === */
.q-note-area {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.q-note-label {
  font-size: 0.78rem; font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.q-note-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.85rem;
  outline: none;
  resize: vertical;
  min-height: 60px;
  max-height: 160px;
  transition: border-color var(--transition);
}
.q-note-input:focus { border-color: var(--accent); }
.q-note-saved {
  font-size: 0.72rem; color: var(--green);
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.3s;
}
.q-note-saved.show { opacity: 1; }

/* === Difficulty dots === */
.difficulty-dots {
  display: inline-flex; gap: 3px;
  margin-left: 8px;
}
.diff-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-strong);
}
.diff-dot.fill { background: var(--red); }
.diff-dot.fill.easy { background: var(--green); }
.diff-dot.fill.med { background: var(--yellow); }

/* === Question count badge on nav === */
.nav-badge {
  position: absolute; top: -4px; right: -4px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  background: var(--red);
  color: #fff;
  font-size: 0.6rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  font-family: var(--font-mono);
}

/* === Timed mode selector === */
.time-select {
  display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
}
.time-option {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.time-option:hover { border-color: var(--text-muted); }
.time-option.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* === Exam mode selection card === */
.mode-cards {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 20px;
}
@media (max-width: 500px) { .mode-cards { grid-template-columns: 1fr; } }
.mode-card {
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.mode-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px var(--accent-glow); }
.mode-card.active { border-color: var(--accent); background: var(--accent-glow); }
.mode-card-icon { font-size: 1.8rem; margin-bottom: 8px; }
.mode-card-title { font-size: 0.92rem; font-weight: 700; }
.mode-card-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

/* === Achievement badges === */
.achievements-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.achievement {
  padding: 20px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: center;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.achievement.unlocked {
  border-color: var(--yellow);
  background: linear-gradient(135deg, var(--bg-card), rgba(234,179,8,0.06));
}
.achievement.locked { opacity: 0.45; filter: grayscale(0.8); }
.achievement-icon { font-size: 2rem; margin-bottom: 8px; }
.achievement-name { font-size: 0.82rem; font-weight: 700; margin-bottom: 2px; }
.achievement-desc { font-size: 0.68rem; color: var(--text-muted); line-height: 1.4; }
.achievement-date { font-size: 0.62rem; color: var(--yellow); margin-top: 6px; font-family: var(--font-mono); }
.achievement.unlocked::after {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(234,179,8,0.06) 50%, transparent 60%);
  animation: achieveShine 3s ease-in-out infinite;
}
@keyframes achieveShine {
  0% { transform: translateX(-100%) rotate(0deg); }
  100% { transform: translateX(100%) rotate(0deg); }
}

/* === Analytics page === */
.analytics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}
.analytics-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}
.analytics-card-title {
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}
.analytics-big-chart {
  height: 120px;
  display: flex; align-items: flex-end; gap: 3px;
}
.analytics-bar {
  flex: 1;
  border-radius: 3px 3px 0 0;
  min-width: 6px;
  transition: height 0.5s ease;
  cursor: default;
  position: relative;
}
.analytics-bar:hover { opacity: 0.8; }
.analytics-bar:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  padding: 4px 8px; background: var(--bg-card);
  border: 1px solid var(--border-strong); border-radius: 4px;
  font-size: 0.68rem; font-family: var(--font-mono);
  white-space: nowrap; z-index: 10; color: var(--text-primary);
  box-shadow: var(--shadow);
}
.analytics-x-labels {
  display: flex; gap: 3px; margin-top: 6px;
}
.analytics-x-label {
  flex: 1; text-align: center;
  font-size: 0.58rem; color: var(--text-muted);
  font-family: var(--font-mono);
}
.analytics-legend {
  display: flex; gap: 16px; margin-top: 12px;
  flex-wrap: wrap;
}
.analytics-legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.72rem; color: var(--text-secondary);
}
.analytics-legend-dot {
  width: 8px; height: 8px; border-radius: 2px;
}

/* === Heatmap calendar === */
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  position: relative;
  cursor: default;
  transition: transform 0.15s;
}
.heatmap-cell:hover { transform: scale(1.2); z-index: 2; }
.heatmap-cell:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 4px); left: 50%;
  transform: translateX(-50%);
  padding: 3px 8px; background: var(--bg-card);
  border: 1px solid var(--border-strong); border-radius: 4px;
  font-size: 0.62rem; font-family: var(--font-mono);
  white-space: nowrap; z-index: 10; color: var(--text-primary);
  box-shadow: var(--shadow);
}

/* === CSV import note === */
.import-format-tabs {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.import-format-tab {
  padding: 6px 14px; border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary);
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); transition: all var(--transition);
}
.import-format-tab.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

/* === Print mode === */
@media print {
  body::before, .top-nav, .mobile-exam-bar, .exam-actions,
  .q-nav, .kbd-hints, .exam-progress-bar, .q-bookmark,
  .q-note-area, .toast, .splash { display: none !important; }
  body { background: #fff !important; color: #000 !important; }
  .page { max-width: 100%; padding: 20px !important; }
  .q-card { border: 1px solid #ddd !important; break-inside: avoid; page-break-inside: avoid; }
  .q-option { border: 1px solid #ccc !important; }
  .q-explanation { border-left: 3px solid #f97316 !important; }
  .result-hero { padding: 20px 0 !important; }
  .score-ring-wrap svg { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}

/* === Animated number counter === */
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.count-anim { animation: countUp 0.5s ease both; }
.count-anim-1 { animation-delay: 0.1s; }
.count-anim-2 { animation-delay: 0.2s; }
.count-anim-3 { animation-delay: 0.3s; }

/* === Improved hover on stat cards === */
.stat-card:hover .stat-value { transform: scale(1.05); }

/* === Round 7: Custom Exam Builder === */
.builder-chapters-list {
  max-height: 240px;
  overflow-y: auto;
  margin-bottom: 16px;
}
.builder-ch-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
  cursor: pointer;
  transition: background var(--transition);
}
.builder-ch-row:hover { background: var(--bg-card-hover); }
.builder-ch-row:last-child { border-bottom: none; }
.builder-ch-row input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
}
.builder-option-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
.builder-option-row:last-child { border-bottom: none; }
.builder-select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.82rem;
  outline: none;
}

/* === Round 7: Keyboard Shortcut Help === */
.shortcut-help-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
  font-size: 1.2rem; font-weight: 700;
  cursor: pointer;
  z-index: 90;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow);
  transition: all var(--transition);
}
.shortcut-help-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 4px 20px var(--accent-glow);
}
@media (max-width: 768px) { .shortcut-help-btn { bottom: 80px; } }
.shortcuts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 500px) { .shortcuts-grid { grid-template-columns: 1fr; } }
.shortcut-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  font-size: 0.82rem;
}
.shortcut-key {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 32px; height: 28px;
  padding: 0 8px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.72rem; font-weight: 700;
  flex-shrink: 0;
}
.shortcut-desc { color: var(--text-secondary); }

/* === Round 7: Difficulty Badge === */
.difficulty-badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.03em;
}
.difficulty-badge.easy { background: var(--green-bg); color: var(--green); }
.difficulty-badge.medium { background: var(--yellow-bg); color: var(--yellow); }
.difficulty-badge.hard { background: var(--red-bg); color: var(--red); }

/* === Round 7: Streak Fire Animation === */
@keyframes fireFlicker {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.15) rotate(-3deg); }
  50% { transform: scale(1.05) rotate(2deg); }
  75% { transform: scale(1.2) rotate(-2deg); }
}
.streak-fire-animated {
  display: inline-block;
  animation: fireFlicker 0.6s ease-in-out infinite;
}
.streak-badge-glow {
  box-shadow: 0 0 16px rgba(249,115,22,0.4), 0 0 32px rgba(234,179,8,0.2);
}

/* === Round 7: History Replay === */
.history-row-actions {
  display: flex; align-items: center; gap: 8px;
}
.history-detail-btn {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent);
  background: none;
  color: var(--accent);
  font-size: 0.72rem; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.history-detail-btn:hover {
  background: var(--accent-glow);
}

/* === Round 8: Per-Question Notes (collapsible) === */
.q-note-section {
  margin-top: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.q-note-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-input);
  cursor: pointer;
  font-size: 0.85rem; font-weight: 600;
  color: var(--text-secondary);
  transition: background var(--transition);
  user-select: none;
}
.q-note-section-header:hover { background: var(--bg-card-hover); }
.q-note-section-header .note-indicator {
  font-size: 0.72rem; color: var(--accent); font-weight: 700;
}
.q-note-section-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.q-note-section-body.open {
  max-height: 300px;
}
.q-note-section-body-inner {
  padding: 12px 16px;
}
.q-note-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.85rem;
  outline: none;
  resize: vertical;
  min-height: 70px;
  max-height: 180px;
  transition: border-color var(--transition);
}
.q-note-textarea:focus { border-color: var(--accent); }
.q-note-save-status {
  font-size: 0.72rem; color: var(--green);
  margin-top: 4px; opacity: 0;
  transition: opacity 0.3s;
}
.q-note-save-status.show { opacity: 1; }
.explorer-note-icon {
  color: var(--accent); font-size: 0.82rem; margin-left: 4px;
}
.explorer-note-text {
  margin-top: 8px; padding: 8px 12px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  font-size: 0.82rem; color: var(--text-secondary);
  line-height: 1.5;
  border-left: 3px solid var(--accent);
}

/* === Round 8: Share Card Modal === */
.share-card-modal {
  text-align: center;
}
.share-card-modal canvas {
  max-width: 100%;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  margin-bottom: 16px;
}
.share-card-modal img {
  max-width: 100%;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  margin-bottom: 16px;
}

/* === Round 8: Color Accent Themes === */
.accent-picker {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 4px;
}
.accent-option {
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all var(--transition);
  position: relative;
}
.accent-option:hover { transform: scale(1.15); }
.accent-option.active {
  border-color: var(--text-primary);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}
.accent-option.active::after {
  content: '\2713';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.7rem; font-weight: 900;
}

/* === Round 8: Backup Section === */
.backup-section {
  display: flex; gap: 10px; margin-top: 8px;
}
.backup-section .btn { flex: 1; justify-content: center; font-size: 0.82rem; }

/* === Round 8: Pomodoro Timer === */
.pomodoro-display {
  text-align: center; padding: 20px 0;
}
.pomodoro-circle {
  position: relative;
  width: 200px; height: 200px;
  margin: 0 auto 20px;
}
.pomodoro-circle svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.pomodoro-circle-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.pomodoro-time {
  font-family: var(--font-mono);
  font-size: 2.8rem; font-weight: 900;
  line-height: 1;
}
.pomodoro-phase {
  font-size: 0.82rem; color: var(--text-secondary);
  margin-top: 6px;
}
.pomodoro-controls {
  display: flex; gap: 10px; justify-content: center;
  margin-bottom: 16px;
}
.pomodoro-config {
  display: flex; gap: 16px; justify-content: center;
  margin-bottom: 20px;
  font-size: 0.82rem; color: var(--text-secondary);
}
.pomodoro-config label {
  display: flex; align-items: center; gap: 6px;
}
.pomodoro-config input[type="number"] {
  width: 56px; padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  text-align: center; outline: none;
}
.pomodoro-stats {
  font-size: 0.82rem; color: var(--text-muted);
  text-align: center;
}
.pomodoro-dashboard-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--red-bg);
  border: 1px solid var(--red);
  border-radius: var(--radius-sm);
  color: var(--red);
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.pomodoro-dashboard-btn:hover {
  background: var(--red);
  color: #fff;
}

/* === Round 8: Question Stats === */
.q-stats-indicator {
  font-size: 0.72rem; color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
.q-stats-indicator .good { color: var(--green); }
.q-stats-indicator .mid { color: var(--yellow); }
.q-stats-indicator .bad { color: var(--red); }

/* === Round 9: Weak Topic Analysis === */
.weak-section { margin-top: 24px; }
.weak-bar-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; font-size: 0.85rem;
}
.weak-bar-label { min-width: 100px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.weak-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.weak-bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
.weak-bar-pct { min-width: 48px; text-align: right; font-family: var(--font-mono); font-weight: 700; font-size: 0.82rem; }
.weak-missed-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem;
}
.weak-missed-item:last-child { border-bottom: none; }
.weak-missed-q { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 12px; }
.weak-missed-stat { font-family: var(--font-mono); font-size: 0.78rem; color: var(--red); font-weight: 600; min-width: 60px; text-align: right; }
.weak-missed-link { color: var(--accent); cursor: pointer; font-size: 0.78rem; font-weight: 600; margin-left: 8px; white-space: nowrap; }
.weak-missed-link:hover { opacity: 0.7; }

/* === Round 9: Review Annotations === */
.review-annotation {
  margin-top: 16px; padding: 16px;
  background: rgba(59,130,246,0.06);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--radius);
}
.review-annotation-label { font-size: 0.82rem; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
.review-annotation-input {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem; outline: none;
  transition: border-color var(--transition);
}
.review-annotation-input:focus { border-color: var(--blue); }
.review-annotation-saved { font-size: 0.72rem; color: var(--green); margin-top: 4px; display: none; }

/* === Round 9: Question Reporting === */
.q-report-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;

}

/* === Round 9: Question Tags === */
.q-tag {

// === DEMO QUESTION BANK ===
const DEMO_BANK = { chapters: [
// CHAPTER 1: 计算机基础知识
{
  name: "计算机基础知识",
  questions: [
    {id:"c1q1",type:"single",question:"计算机中，1 个字节（Byte）等于多少位（bit）？",options:["4位","8位","16位","32位"],answer:"B",explanation:"1 Byte = 8 bit，这是计算机存储的最基本单位换算。字节是计算机中最小的可寻址存储单元。"},
    {id:"c1q2",type:"single",question:"以下哪个不是计算机的输入设备？",options:["键盘","鼠标","显示器","扫描仪"],answer:"C",explanation:"显示器是输出设备，用于显示计算机处理结果。键盘、鼠标、扫描仪都是输入设备，用于向计算机输入数据。"},
    {id:"c1q3",type:"single",question:"CPU的中文名称是什么？",options:["中央处理器","内存储器","控制器","运算器"],answer:"A",explanation:"CPU（Central Processing Unit）即中央处理器，是计算机的核心部件，负责执行指令和数据处理。它包含控制器和运算器两大部分。"},
    {id:"c1q4",type:"multi",question:"以下哪些属于计算机的存储设备？（多选）",options:["硬盘","内存","CPU","固态硬盘"],answer:["A","B","D"],explanation:"硬盘(HDD)、内存(RAM)和固态硬盘(SSD)都是存储设备。CPU是处理器，负责计算和控制，不是存储设备。"},
    {id:"c1q5",type:"tf",question:"二进制数 1010 对应的十进制数是 10。",answer:"true",explanation:"二进制转十进制：1×2³ + 0×2² + 1×2¹ + 0×2⁰ = 8 + 0 + 2 + 0 = 10。"},
    {id:"c1q6",type:"single",question:"以下哪个是操作系统？",options:["Microsoft Word","Windows 11","Chrome浏览器","Photoshop"],answer:"B",explanation:"Windows 11 是微软开发的操作系统。Word是文字处理软件，Chrome是浏览器，Photoshop是图像编辑软件，它们都是应用软件。"},
    {id:"c1q7",type:"fill",question:"计算机网络中，IP地址的版本4（IPv4）使用____位二进制数表示。",answer:"32",explanation:"IPv4地址由32位二进制数组成，通常用点分十进制表示，如192.168.1.1。每段8位，共4段。"},
    {id:"c1q8",type:"single",question:"RAM 的特点是什么？",options:["断电后数据不丢失","只能读不能写","断电后数据丢失","存储容量最大"],answer:"C",explanation:"RAM（随机存取存储器）是易失性存储器，断电后数据会丢失。它的特点是读写速度快，用作计算机的主存。"},
    {id:"c1q9",type:"single",question:"以下哪种进制在计算机底层使用最广泛？",options:["十进制","二进制","八进制","十六进制"],answer:"B",explanation:"计算机底层使用二进制（0和1），因为电子元件最容易表示两种状态（高电平/低电平）。八进制和十六进制是为了方便人类阅读二进制而使用的。"},
    {id:"c1q10",type:"multi",question:"以下哪些是常见的网络协议？（多选）",options:["HTTP","FTP","JPEG","TCP"],answer:["A","B","D"],explanation:"HTTP（超文本传输协议）、FTP（文件传输协议）、TCP（传输控制协议）都是网络协议。JPEG是图像格式标准，不是网络协议。"},
    {id:"c1q11",type:"single",question:"USB 的全称是什么？",options:["Universal Serial Bus","United System Board","Universal System Bus","Ultra Speed Bus"],answer:"A",explanation:"USB全称Universal Serial Bus（通用串行总线），是一种通用的外部设备连接标准，支持即插即用和热插拔。"},
    {id:"c1q12",type:"tf",question:"固态硬盘（SSD）比机械硬盘（HDD）的读写速度更快。",answer:"true",explanation:"SSD使用闪存芯片存储数据，没有机械部件，读写速度远快于使用磁盘旋转读写的HDD。SSD的随机读写性能尤其优越。"},
    {id:"c1q13",type:"single",question:"计算机病毒是一种什么？",options:["生物病毒","硬件故障","恶意程序","系统升级"],answer:"C",explanation:"计算机病毒是人为编写的恶意程序，能够自我复制并破坏计算机系统。它不是生物病毒，也不是硬件故障。"},
    {id:"c1q14",type:"single",question:"1 GB 等于多少 MB？",options:["100 MB","512 MB","1000 MB","1024 MB"],answer:"D",explanation:"在二进制计算中，1 GB = 1024 MB。这是因为计算机使用2的幂次：1 GB = 2¹⁰ MB = 1024 MB。"},
    {id:"c1q15",type:"fill",question:"HTML 的中文含义是____。",answer:"超文本标记语言",explanation:"HTML（HyperText Markup Language）即超文本标记语言，是构建网页的标准标记语言。它使用标签来描述网页的结构和内容。"},
    {id:"c1q16",type:"single",question:"以下哪个不是编程语言？",options:["Python","Java","Excel","C++"],answer:"C",explanation:"Excel是微软开发的电子表格软件，属于应用软件，不是编程语言。Python、Java、C++都是广泛使用的编程语言。"},
    {id:"c1q17",type:"multi",question:"冯·诺依曼体系结构的计算机包含哪些部分？（多选）",options:["运算器","控制器","存储器","输入/输出设备"],answer:["A","B","C","D"],explanation:"冯·诺依曼体系结构定义了计算机的五大组成部分：运算器、控制器、存储器、输入设备和输出设备。这是现代计算机的基本架构。"},
    {id:"c1q18",type:"tf",question:"DNS 的作用是将域名解析为 IP 地址。",answer:"true",explanation:"DNS（Domain Name System）域名系统的主要功能就是将人类可读的域名（如www.example.com）转换为计算机可识别的IP地址。"},
    {id:"c1q19",type:"single",question:"以下哪种网络拓扑结构中，所有节点通过一条主干线连接？",options:["星型","总线型","环形","网状"],answer:"B",explanation:"总线型拓扑中，所有设备共享一条通信总线。星型以中心节点为核心，环形首尾相连，网状结构任意两点间有多条路径。"},
    {id:"c1q20",type:"single",question:"计算机中的 Cache 是指什么？",options:["主存","高速缓存","硬盘","显存"],answer:"B",explanation:"Cache（高速缓存）位于CPU与主存之间，用于缓解CPU和内存之间的速度差距。它存储最近频繁使用的数据，提高系统性能。"},
    {id:"c1q21",type:"fill",question:"OSI参考模型共分为____层。",answer:"7",explanation:"OSI（开放系统互联）参考模型分为7层：物理层、数据链路层、网络层、传输层、会话层、表示层、应用层。"},
    {id:"c1q22",type:"single",question:"以下哪个端口号是HTTP协议的默认端口？",options:["21","22","80","443"],answer:"C",explanation:"HTTP默认端口是80，HTTPS默认端口是443，FTP默认端口是21，SSH默认端口是22。"},
    {id:"c1q23",type:"tf",question:"64位操作系统可以运行32位的应用程序。",answer:"true",explanation:"64位操作系统通常兼容32位应用程序，通过WoW64（Windows）或兼容层实现向下兼容。但32位系统不能运行64位程序。"},
    {id:"c1q24",type:"multi",question:"以下哪些属于非易失性存储器？（多选）",options:["ROM","RAM","Flash","硬盘"],answer:["A","C","D"],explanation:"ROM（只读存储器）、Flash（闪存）、硬盘都是非易失性存储器，断电后数据不会丢失。RAM是易失性存储器。"},
    {id:"c1q25",type:"single",question:"以下哪个协议用于发送电子邮件？",options:["POP3","SMTP","HTTP","FTP"],answer:"B",explanation:"SMTP（Simple Mail Transfer Protocol）用于发送邮件，POP3和IMAP用于接收邮件，HTTP用于网页访问，FTP用于文件传输。"},
    {id:"c1q26",type:"single",question:"ASCII码中，字母'A'的十进制值是多少？",options:["55","60","65","70"],answer:"C",explanation:"在ASCII编码表中，大写字母A的编码是65，B是66，依此类推。小写字母a是97。数字0的ASCII码是48。"},
    {id:"c1q27",type:"tf",question:"光纤通信使用的是电信号传输数据。",answer:"false",explanation:"光纤通信使用光信号（而非电信号）传输数据，通过全反射原理在光纤中传播。光纤具有传输速度快、带宽大、抗干扰能力强等优点。"},
    {id:"c1q28",type:"single",question:"以下哪个不是数据库管理系统？",options:["MySQL","Oracle","Linux","SQL Server"],answer:"C",explanation:"Linux是操作系统，不是数据库管理系统。MySQL、Oracle、SQL Server都是常见的关系型数据库管理系统（RDBMS）。"},
    {id:"c1q29",type:"fill",question:"TCP/IP协议族中，TCP提供的是面向____的可靠传输服务。",answer:"连接",explanation:"TCP（传输控制协议）是面向连接的协议，通过三次握手建立连接，提供可靠的数据传输。与之对比，UDP是无连接的协议。"},
    {id:"c1q30",type:"single",question:"以下哪种软件属于系统软件？",options:["微信","编译器","游戏","浏览器"],answer:"B",explanation:"编译器属于系统软件，用于将高级语言代码翻译为机器语言。微信、游戏、浏览器都是应用软件。系统软件还包括操作系统、驱动程序等。"},
    {id:"c1q31",type:"multi",question:"以下哪些是无线通信技术？（多选）",options:["Wi-Fi","蓝牙","光纤","5G"],answer:["A","B","D"],explanation:"Wi-Fi、蓝牙、5G都是无线通信技术。光纤是有线通信介质，通过光缆传输光信号。"},
    {id:"c1q32",type:"single",question:"计算机中用来存储正在运行程序和数据的部件是？",options:["硬盘","CPU","内存(RAM)","显卡"],answer:"C",explanation:"内存（RAM）用于暂时存储正在运行的程序和数据，CPU可以直接快速访问内存中的数据。硬盘是长期存储，CPU是处理器。"},
    {id:"c1q33",type:"tf",question:"防火墙可以完全阻止所有网络攻击。",answer:"false",explanation:"防火墙是网络安全的重要组件，但不能完全阻止所有攻击。它主要通过规则过滤网络流量，但无法防御所有类型的攻击（如社会工程学攻击、零日漏洞等）。"},
    {id:"c1q34",type:"single",question:"哪种编码标准支持全球大多数语言的字符？",options:["ASCII","GBK","Unicode","BIG5"],answer:"C",explanation:"Unicode是国际标准字符集，旨在涵盖世界上所有语言的字符。ASCII仅支持英文，GBK和BIG5主要支持中文。"},
    {id:"c1q35",type:"single",question:"在网络通信中，子网掩码的作用是什么？",options:["加密数据","区分网络号和主机号","解析域名","分配IP地址"],answer:"B",explanation:"子网掩码用于将IP地址划分为网络部分和主机部分，帮助路由器判断目标IP是否在同一子网中。"}
  ]
},
// CHAPTER 2: 数据结构与算法
{
  name: "数据结构与算法",
  questions: [
    {id:"c2q1",type:"single",question:"以下哪种数据结构遵循「先进先出」(FIFO)原则？",options:["栈","队列","数组","链表"],answer:"B",explanation:"队列（Queue）遵循先进先出（FIFO）原则，先入队的元素先出队。栈遵循后进先出（LIFO）原则。"},
    {id:"c2q2",type:"single",question:"在一个长度为n的有序数组中进行二分查找，时间复杂度是多少？",options:["O(1)","O(n)","O(log n)","O(n²)"],answer:"C",explanation:"二分查找每次将搜索范围缩小一半，因此时间复杂度为O(log n)。这比线性查找O(n)高效得多。"},
    {id:"c2q3",type:"tf",question:"链表的插入操作时间复杂度始终为 O(1)。",answer:"false",explanation:"链表在已知插入位置时（如头部插入），时间复杂度为O(1)。但如果需要先查找插入位置，则需O(n)的时间来遍历。"},
    {id:"c2q4",type:"multi",question:"以下哪些排序算法的平均时间复杂度为 O(n log n)？（多选）",options:["冒泡排序","快速排序","归并排序","堆排序"],answer:["B","C","D"],explanation:"快速排序、归并排序、堆排序的平均时间复杂度均为O(n log n)。冒泡排序的平均和最坏情况时间复杂度都是O(n²)。"},
    {id:"c2q5",type:"single",question:"哈希表解决冲突的常用方法不包括以下哪个？",options:["开放地址法","链地址法","再散列法","二分法"],answer:"D",explanation:"哈希冲突的常用解决方法有：开放地址法（线性探测、二次探测）、链地址法（拉链法）、再散列法。二分法是查找算法，不是解决哈希冲突的方法。"},
    {id:"c2q6",type:"fill",question:"完全二叉树中，若节点总数为n，则树的高度为____（用log表示，向下取整+1）。",answer:"⌊log₂n⌋+1",explanation:"完全二叉树的高度h=⌊log₂n⌋+1。这是因为完全二叉树的前h-1层是满的，包含2^(h-1)-1个节点。"},
    {id:"c2q7",type:"single",question:"以下哪种遍历方式不属于二叉树的深度优先遍历？",options:["前序遍历","中序遍历","层序遍历","后序遍历"],answer:"C",explanation:"层序遍历（按层次从上到下、从左到右遍历）属于广度优先遍历(BFS)。前序、中序、后序遍历都属于深度优先遍历(DFS)。"},
    {id:"c2q8",type:"single",question:"图的最短路径算法 Dijkstra 不适用于以下哪种情况？",options:["有向图","无向图","含负权边的图","稀疏图"],answer:"C",explanation:"Dijkstra算法不能处理含有负权边的图，因为其贪心策略假设已确定的最短路径不会被后续发现的路径更新。含负权边应使用Bellman-Ford算法。"},
    {id:"c2q9",type:"tf",question:"AVL树是一种自平衡的二叉搜索树。",answer:"true",explanation:"AVL树是最早发明的自平衡二叉搜索树，它要求每个节点的左右子树高度差（平衡因子）的绝对值不超过1，通过旋转操作维持平衡。"},
    {id:"c2q10",type:"single",question:"以下哪个算法使用了分治思想？",options:["冒泡排序","归并排序","插入排序","选择排序"],answer:"B",explanation:"归并排序使用分治策略：将数组分成两半分别排序，再合并有序的两半。冒泡、插入、选择排序都是简单的迭代排序算法。"},
    {id:"c2q11",type:"multi",question:"以下哪些是线性数据结构？（多选）",options:["数组","二叉树","栈","图"],answer:["A","C"],explanation:"数组和栈是线性数据结构，元素之间是一对一的关系。二叉树是层次结构（一对多），图是网状结构（多对多），都是非线性的。"},
    {id:"c2q12",type:"single",question:"栈的典型应用场景不包括以下哪个？",options:["函数调用","表达式求值","任务调度","括号匹配"],answer:"C",explanation:"任务调度通常使用队列（先到先服务）或优先队列。函数调用（调用栈）、表达式求值、括号匹配都是栈的经典应用。"},
    {id:"c2q13",type:"single",question:"在最坏情况下，快速排序的时间复杂度是多少？",options:["O(n log n)","O(n)","O(n²)","O(log n)"],answer:"C",explanation:"当快速排序每次都选到最大或最小元素作为基准时（如已排序数组），退化为O(n²)。可以通过随机选择基准来避免最坏情况。"},
    {id:"c2q14",type:"tf",question:"B+树的所有数据都存储在叶子节点中。",answer:"true",explanation:"B+树的特点是所有数据记录都存储在叶子节点，内部节点只存储键值用于索引。叶子节点之间通过指针连接，便于范围查询。这是数据库索引常用的结构。"},
    {id:"c2q15",type:"single",question:"动态规划与贪心算法的主要区别是什么？",options:["动态规划不需要递归","贪心算法时间复杂度更高","动态规划考虑全局最优，贪心只考虑局部最优","两者没有区别"],answer:"C",explanation:"贪心算法在每一步选择当前最优解，不回溯；动态规划通过保存子问题的解，综合考虑所有情况得到全局最优解。贪心不一定得到全局最优。"},
    {id:"c2q16",type:"single",question:"红黑树的根节点颜色必须是什么颜色？",options:["红色","黑色","红色或黑色均可","无颜色要求"],answer:"B",explanation:"红黑树的性质之一：根节点必须是黑色。其他性质包括：叶子节点（NIL）为黑色、红色节点的子节点必须为黑色、任意节点到叶子的路径包含相同数量的黑色节点。"},
    {id:"c2q17",type:"fill",question:"对n个元素进行堆排序，其空间复杂度为____。",answer:"O(1)",explanation:"堆排序是原地排序算法，只需要常数级的额外空间O(1)来交换元素。它在原数组上构建堆并进行排序，不需要额外的数组。"},
    {id:"c2q18",type:"single",question:"图的深度优先搜索(DFS)使用什么数据结构实现？",options:["队列","栈","堆","哈希表"],answer:"B",explanation:"DFS使用栈（或递归调用栈）来实现。先访问一个节点，然后深入其未访问的邻居节点。BFS使用队列实现。"},
    {id:"c2q19",type:"multi",question:"以下哪些是稳定的排序算法？（多选）",options:["归并排序","快速排序","插入排序","冒泡排序"],answer:["A","C","D"],explanation:"稳定排序算法保持相等元素的相对顺序。归并排序、插入排序、冒泡排序是稳定的。快速排序、堆排序、选择排序是不稳定的。"},
    {id:"c2q20",type:"single",question:"KMP算法用于解决什么问题？",options:["图的最短路径","字符串模式匹配","数组排序","树的遍历"],answer:"B",explanation:"KMP（Knuth-Morris-Pratt）算法是高效的字符串模式匹配算法，利用已匹配的信息避免重复比较，时间复杂度为O(n+m)。"},
    {id:"c2q21",type:"single",question:"以下哪种数据结构支持 O(log n) 的查找、插入和删除？",options:["数组","链表","平衡二叉搜索树","哈希表"],answer:"C",explanation:"平衡二叉搜索树（如AVL树、红黑树）的查找、插入和删除操作时间复杂度均为O(log n)。数组查找O(n)，哈希表平均O(1)但最坏O(n)。"},
    {id:"c2q22",type:"tf",question:"拓扑排序只能用于有向无环图（DAG）。",answer:"true",explanation:"拓扑排序要求图中不能有环，因此只能应用于有向无环图（DAG）。如果图中有环，则不存在拓扑排序。拓扑排序常用于任务依赖关系的调度。"},
    {id:"c2q23",type:"single",question:"以下哪种算法用于求解最小生成树？",options:["Dijkstra","Floyd","Kruskal","BFS"],answer:"C",explanation:"Kruskal算法和Prim算法都用于求最小生成树。Dijkstra求单源最短路径，Floyd求全源最短路径，BFS是广度优先搜索。"},
    {id:"c2q24",type:"single",question:"双向链表相比单向链表的优势是什么？",options:["占用更少内存","可以双向遍历","插入更快","查找更快"],answer:"B",explanation:"双向链表每个节点有前驱和后继两个指针，可以双向遍历。但它占用更多内存（多一个指针域）。查找和插入的时间复杂度与单向链表相同。"},
    {id:"c2q25",type:"fill",question:"n个节点的完全图共有____条边。",answer:"n(n-1)/2",explanation:"完全图中每对节点之间都有一条边。n个节点中选2个的组合数为C(n,2) = n(n-1)/2。"},
    {id:"c2q26",type:"single",question:"以下哪种排序算法在最好情况下时间复杂度为 O(n)？",options:["快速排序","堆排序","插入排序","选择排序"],answer:"C",explanation:"当输入数组已经有序时，插入排序只需进行n-1次比较，不需要移动元素，时间复杂度为O(n)。快速排序最好是O(n log n)，选择排序始终O(n²)。"},
    {id:"c2q27",type:"tf",question:"哈希表的查找时间复杂度在最坏情况下是 O(n)。",answer:"true",explanation:"当所有键都映射到同一个桶时（极端哈希冲突），哈希表退化为链表，查找需要O(n)。但设计良好的哈希函数使得平均查找时间为O(1)。"},
    {id:"c2q28",type:"multi",question:"以下哪些问题可以用动态规划解决？（多选）",options:["最长公共子序列","背包问题","最短路径","八皇后问题"],answer:["A","B","C"],explanation:"最长公共子序列、背包问题、最短路径（如Floyd算法）都是动态规划的经典应用。八皇后问题通常用回溯法解决。"},
    {id:"c2q29",type:"single",question:"在循环队列中，判断队满的条件是什么？",options:["front == rear","(rear + 1) % size == front","rear == size","front == 0"],answer:"B",explanation:"循环队列中，牺牲一个存储位置来区分队空和队满。队满条件：(rear+1)%size == front；队空条件：front == rear。"},
    {id:"c2q30",type:"single",question:"以下哪种算法可以检测图中是否存在环？",options:["Dijkstra","DFS","二分查找","哈希查找"],answer:"B",explanation:"DFS（深度优先搜索）可以通过检测回边（访问到已在递归栈中的节点）来判断图中是否存在环。也可以使用拓扑排序来检测。"},
    {id:"c2q31",type:"single",question:"优先队列通常用什么数据结构实现？",options:["数组","链表","堆","栈"],answer:"C",explanation:"优先队列通常使用堆（二叉堆）实现，可以在O(log n)时间内完成插入和取出最大/最小元素操作。数组和链表实现的效率较低。"},
    {id:"c2q32",type:"tf",question:"广度优先搜索可以用来寻找无权图的最短路径。",answer:"true",explanation:"BFS按层次遍历，首次访问到目标节点时经过的层数就是最短路径长度。但这只适用于无权图或边权相等的图。"},
    {id:"c2q33",type:"single",question:"以下哪个不是哈希函数的设计要求？",options:["计算简单高效","冲突尽量少","输出值均匀分布","必须可逆"],answer:"D",explanation:"好的哈希函数应该计算快速、冲突少、输出均匀。哈希函数不需要可逆（单向性反而是密码学哈希的优点）。"},
    {id:"c2q34",type:"single",question:"Trie树（字典树）最适合解决什么问题？",options:["数值排序","字符串前缀匹配","图遍历","最短路径"],answer:"B",explanation:"Trie树（前缀树/字典树）是专门用于高效存储和检索字符串的数据结构，特别擅长前缀匹配查询，常用于自动补全、拼写检查等。"},
    {id:"c2q35",type:"multi",question:"以下哪些数据结构可以用数组实现？（多选）",options:["栈","队列","堆","图"],answer:["A","B","C","D"],explanation:"所有这些数据结构都可以用数组实现。栈和队列可用数组模拟，堆常用数组存储（完全二叉树的数组表示），图可用邻接矩阵（二维数组）表示。"}
  ]
},
// CHAPTER 3: 操作系统原理
{
  name: "操作系统原理",
  questions: [
    {id:"c3q1",type:"single",question:"操作系统的核心功能不包括以下哪项？",options:["进程管理","内存管理","文本编辑","文件管理"],answer:"C",explanation:"操作系统的核心功能包括进程管理、内存管理、文件管理、设备管理和用户接口。文本编辑是应用软件的功能，不属于操作系统核心功能。"},
    {id:"c3q2",type:"single",question:"以下哪种进程调度算法可能导致「饥饿」问题？",options:["先来先服务(FCFS)","短作业优先(SJF)","时间片轮转(RR)","多级反馈队列"],answer:"B",explanation:"短作业优先(SJF)调度中，如果不断有短作业到来，长作业可能一直得不到执行，产生饥饿现象。FCFS和RR不会产生饥饿。"},
    {id:"c3q3",type:"tf",question:"死锁的四个必要条件是互斥、占有且等待、非抢占和循环等待。",answer:"true",explanation:"死锁的四个必要条件：1）互斥条件 2）占有且等待条件 3）非抢占条件 4）循环等待条件。四个条件同时满足才会发生死锁，破坏任一条件即可预防死锁。"},
    {id:"c3q4",type:"multi",question:"以下哪些是页面置换算法？（多选）",options:["FIFO","LRU","Dijkstra","LFU"],answer:["A","B","D"],explanation:"FIFO（先进先出）、LRU（最近最少使用）、LFU（最不经常使用）都是页面置换算法。Dijkstra是图的最短路径算法，不是页面置换算法。"},
    {id:"c3q5",type:"single",question:"虚拟内存技术的主要目的是什么？",options:["提高CPU速度","扩大逻辑地址空间","减少硬盘使用","加快网络速度"],answer:"B",explanation:"虚拟内存使程序可以使用比物理内存更大的逻辑地址空间，通过将部分数据存放在磁盘上，需要时再调入内存，实现了内存空间的逻辑扩展。"},
    {id:"c3q6",type:"single",question:"进程和线程的主要区别是什么？",options:["进程更快","线程是CPU调度的基本单位","进程不能并发","线程不共享资源"],answer:"B",explanation:"线程是CPU调度和执行的基本单位，进程是资源分配的基本单位。同一进程的线程共享进程的地址空间和资源，但各有独立的栈和程序计数器。"},
    {id:"c3q7",type:"fill",question:"在页式存储管理中，逻辑地址由页号和____两部分组成。",answer:"页内偏移",explanation:"页式存储管理中，逻辑地址分为页号（Page Number）和页内偏移量（Offset）。页号用于查找页表，得到物理块号，再结合偏移量得到物理地址。"},
    {id:"c3q8",type:"single",question:"以下哪种调度算法对短作业最有利？",options:["先来先服务","短作业优先","高响应比优先","时间片轮转"],answer:"B",explanation:"短作业优先（SJF）算法总是优先执行执行时间最短的作业，因此对短作业最有利。但可能导致长作业饥饿。"},
    {id:"c3q9",type:"single",question:"信号量（Semaphore）的 P 操作表示什么？",options:["释放资源","申请资源","创建进程","终止进程"],answer:"B",explanation:"P操作（wait/down）：申请资源，信号量值减1。若减后小于0，进程阻塞等待。V操作（signal/up）：释放资源，信号量值加1。PV操作是进程同步的重要机制。"},
    {id:"c3q10",type:"tf",question:"用户态程序可以直接执行特权指令。",answer:"false",explanation:"特权指令（如I/O操作、修改程序状态字等）只能在核心态（内核态）下执行。用户态程序不能直接执行特权指令，必须通过系统调用切换到内核态。"},
    {id:"c3q11",type:"single",question:"以下哪种内存分配算法会产生外部碎片？",options:["分页管理","分段管理","固定分区","分页和分段都会"],answer:"B",explanation:"分段管理中，由于段的大小不固定，内存释放后会产生大小不一的空闲区域（外部碎片）。分页管理将内存分成固定大小的页框，不会产生外部碎片（但有内部碎片）。"},
    {id:"c3q12",type:"multi",question:"以下哪些是进程的基本状态？（多选）",options:["就绪态","运行态","阻塞态","挂起态"],answer:["A","B","C"],explanation:"进程的三种基本状态：就绪态（等待CPU）、运行态（正在执行）、阻塞态（等待事件）。挂起态是某些系统中的扩展状态，不属于三种基本状态。"},
    {id:"c3q13",type:"single",question:"银行家算法用于解决什么问题？",options:["内存分配","死锁避免","进程调度","文件管理"],answer:"B",explanation:"银行家算法是经典的死锁避免算法，通过检查资源分配后系统是否仍处于安全状态来决定是否分配资源。它由Dijkstra提出。"},
    {id:"c3q14",type:"single",question:"磁盘调度算法中，SCAN算法又称为什么？",options:["先来先服务","最短寻道","电梯算法","循环扫描"],answer:"C",explanation:"SCAN算法又称电梯算法，磁头像电梯一样在磁盘上来回移动，在一个方向上服务所有请求后再反向。它避免了饥饿问题。"},
    {id:"c3q15",type:"tf",question:"管道（Pipe）是一种进程间通信（IPC）机制。",answer:"true",explanation:"管道是Unix/Linux系统中最基本的进程间通信方式，允许一个进程的输出作为另一个进程的输入。分为无名管道和命名管道（FIFO）。"},
    {id:"c3q16",type:"single",question:"什么是抖动（Thrashing）？",options:["CPU过热","频繁页面置换导致系统效率极低","硬盘损坏","网络延迟过高"],answer:"B",explanation:"抖动是指系统频繁进行页面置换（换入换出），CPU大部分时间用于处理缺页，导致实际工作效率极低。通常由进程数过多或分配的物理页框过少引起。"},
    {id:"c3q17",type:"single",question:"文件系统中，i-node（索引节点）存储的是什么？",options:["文件名","文件内容","文件的元数据","目录结构"],answer:"C",explanation:"i-node存储文件的元数据信息，包括文件大小、权限、所有者、时间戳、数据块指针等。文件名存储在目录项中，文件内容存储在数据块中。"},
    {id:"c3q18",type:"fill",question:"操作系统中，实现进程互斥的硬件方法之一是使用____指令。",answer:"TSL",explanation:"TSL（Test and Set Lock）是一条原子指令，用于实现进程互斥。它在一个不可中断的操作中读取锁变量并将其置为1。类似的还有CAS（Compare and Swap）指令。"},
    {id:"c3q19",type:"multi",question:"以下哪些属于操作系统的类型？（多选）",options:["批处理操作系统","分时操作系统","实时操作系统","编译操作系统"],answer:["A","B","C"],explanation:"批处理、分时和实时操作系统是三种主要类型。批处理追求吞吐量，分时追求响应时间，实时追求严格的时间约束。编译是将代码翻译为机器码的过程，不是操作系统类型。"},

let _dataCache = {};
let _dataCacheReady = false;
const _savePending = {};

function getAuthToken() { return localStorage.getItem('auth_token'); }
function setAuthToken(t) { localStorage.setItem('auth_token', t); }
function clearAuthToken() { localStorage.removeItem('auth_token'); }

async function apiCall(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  const token = getAuthToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (res.status === 401) { clearAuthToken(); showAuthScreen(); throw new Error('unauthorized'); }
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('服务器响应异常，请刷新页面重试'); }
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function scheduleSave(key) {
  if (_savePending[key]) clearTimeout(_savePending[key]);
  _savePending[key] = setTimeout(() => {
    apiCall('PUT', '/api/data/' + key, { value: _dataCache[key] }).catch(e => console.error('Save error:', e));
    delete _savePending[key];
  }, 300);
}

function flushPendingSaves() {
  const token = getAuthToken();
  for (const key of Object.keys(_savePending)) {
    clearTimeout(_savePending[key]);
    const data = JSON.stringify({ value: _dataCache[key] });
    try {
      fetch('/api/data/' + key, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: data,
        keepalive: true
      });
    } catch(e) {}
    delete _savePending[key];
  }
}
window.addEventListener('beforeunload', flushPendingSaves);

async function loadAllUserData() {
  const data = await apiCall('GET', '/api/data');
  _dataCache = {};
  for (const [k, v] of Object.entries(data)) {
    _dataCache[k] = v;
  }
  _dataCacheReady = true;
}

// === SEEDED RANDOM (30-day cycle) ===
function getDayOfCycle() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((now - start) / 86400000);
  return dayOfYear % 30;
}
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}
function getDailyQuestions(chapter, chapterIdx) {
  const day = getDayOfCycle();
  const seed = day * 1000 + chapterIdx * 137 + 42;
  const rng = seededRandom(seed);
  const pool = [...chapter.questions];
  // Fisher-Yates shuffle with seeded rng
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, Math.min(10, pool.length));
}

}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      let data;
      if (file.name.endsWith('.csv')) {
        data = parseCSV(ev.target.result);
      } else {
        data = JSON.parse(ev.target.result);
      }
      if (!data.chapters || !Array.isArray(data.chapters)) throw new Error('格式不对');
      loadBank(data);
    } catch(err) {
      showToast('导入失败：' + (err.message || '格式不正确'));
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}
