let _bankSelectedFile = null;

function wireBankManager() {
  // Tab switching
  document.querySelectorAll('[data-bank-tab]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('[data-bank-tab]').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.bankTab;
      if (tabName === 'upload') renderBankUploadTab();
      else if (tabName === 'mybanks') renderMyBanksTab();
      else if (tabName === 'public') renderPublicBanksTab();
    });
  });

  // Upload zone
  const zone = document.getElementById('bank-upload-zone');
  if (zone) {
    zone.addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = '.doc,.docx,.pdf,.txt,.json,.csv';
      inp.onchange = (e) => handleBankFileSelect(e.target.files[0]);
      inp.click();
    });
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault(); zone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleBankFileSelect(e.dataTransfer.files[0]);
    });
  }

  // Submit / cancel
  document.getElementById('bank-submit-btn')?.addEventListener('click', handleBankSubmit);
  document.getElementById('bank-cancel-btn')?.addEventListener('click', () => {
    _bankSelectedFile = null;
    document.getElementById('bank-upload-form').style.display = 'none';
    document.getElementById('bank-upload-zone').style.display = '';
  });
}

function handleBankFileSelect(file) {
  if (!file) return;
  const ext = file.name.toLowerCase();
  const validExts = ['.doc', '.docx', '.pdf', '.txt', '.json', '.csv'];
  if (!validExts.some(e => ext.endsWith(e))) {
    showToast('不支持的文件格式，请上传 docx/doc/pdf/txt/json/csv 文件');
    return;
  }
  _bankSelectedFile = file;
  // Auto-fill name from filename
  const baseName = file.name.replace(/\.[^.]+$/, '');
  document.getElementById('bank-name-input').value = baseName;
  document.getElementById('bank-file-info').textContent = '已选择: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
  document.getElementById('bank-upload-form').style.display = '';
  document.getElementById('bank-upload-zone').style.display = 'none';
}

async function handleBankSubmit() {
  if (!_bankSelectedFile) return;
  const name = document.getElementById('bank-name-input').value.trim();
  if (!name) { showToast('请输入题库名称'); return; }

  const isPublic = document.getElementById('bank-public-check').checked;
  const btn = document.getElementById('bank-submit-btn');
  const progress = document.getElementById('bank-progress');
  const progressFill = document.getElementById('bank-progress-fill');
  btn.disabled = true;
  btn.textContent = '解析中…';
  progress.style.display = '';
  progressFill.style.width = '30%';

  try {
    const ext = _bankSelectedFile.name.toLowerCase();
    let result;

    if (ext.endsWith('.json') || ext.endsWith('.csv')) {
      // Handle JSON/CSV locally first, then send as JSON import
      const text = await _bankSelectedFile.text();
      let data;
      if (ext.endsWith('.csv')) {
        data = parseCSV(text);
      } else {
        data = JSON.parse(text);
      }
      if (data.chapters && Array.isArray(data.chapters)) {
        // Traditional format — load directly and also save as bank
        progressFill.style.width = '60%';
        const allQ = [];
        data.chapters.forEach(ch => {
          (ch.questions || []).forEach(q => allQ.push(q));
        });
        result = await apiCall('POST', '/api/banks/json', {
          name, questions: allQ, is_public: isPublic
        });
        // Also load as active bank
        loadBank(data);
        progressFill.style.width = '100%';
        showToast('题库「' + name + '」导入成功！共 ' + (result.question_count || allQ.length) + ' 题');
      } else {
        throw new Error('JSON 格式不正确，需要 chapters 数组');
      }
    } else {
      // Upload doc/docx/pdf to server for parsing
      progressFill.style.width = '50%';
      const formData = new FormData();
      formData.append('file', _bankSelectedFile);
      formData.append('name', name);
      formData.append('is_public', isPublic ? '1' : '0');

      const token = getAuthToken();
      const res = await fetch('/api/banks/upload', {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: formData
      });
      const resText = await res.text();
      let resData;
      try { resData = JSON.parse(resText); } catch(e) { throw new Error('服务器响应异常'); }
      if (!res.ok) throw new Error(resData.error || '上传失败');
      result = resData;

      progressFill.style.width = '80%';
      // Convert parsed questions to chapter format and load
      if (result.questions && result.questions.length > 0) {
        const bankData = { chapters: [{ name: name, questions: result.questions }] };
        loadBank(bankData);
      }
      progressFill.style.width = '100%';
      showToast('题库「' + name + '」导入成功！共 ' + result.question_count + ' 题');
    }

    _bankSelectedFile = null;
    document.getElementById('bank-upload-form').style.display = 'none';
    document.getElementById('bank-upload-zone').style.display = '';
  } catch(err) {
    showToast('导入失败：' + (err.message || '未知错误'));
  } finally {
    btn.disabled = false;
    btn.textContent = '解析并导入';
    progress.style.display = 'none';
    progressFill.style.width = '0%';
  }
}

function wireBankUploadZone() {
  const zone = document.getElementById('bank-upload-zone');
  if (zone) {
    zone.addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.doc,.docx,.pdf,.json,.csv';
      inp.onchange = (e) => handleBankFileSelect(e.target.files[0]);
      inp.click();
    });
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault(); zone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleBankFileSelect(e.dataTransfer.files[0]);
    });
  }
  document.getElementById('bank-submit-btn')?.addEventListener('click', handleBankSubmit);
  document.getElementById('bank-cancel-btn')?.addEventListener('click', () => {
    _bankSelectedFile = null;
    document.getElementById('bank-upload-form').style.display = 'none';
    document.getElementById('bank-upload-zone').style.display = '';
  });
}

async function renderMyBanksTab() {
  const content = document.getElementById('bank-tab-content');
  if (!content) return;
  content.innerHTML = '<div class="bank-empty">加载中…</div>';
  try {
    const banks = await apiCall('GET', '/api/banks');

    content.innerHTML = '<div class="bank-list">' + banks.map(b => `

async function useBankById(bankId) {
  try {
    showToast('加载题库…');
    const data = await apiCall('GET', '/api/banks/' + bankId);
    if (!data.questions || data.questions.length === 0) {
      showToast('题库为空'); return;
    }
    // Convert to chapter format
    const bankData = { chapters: [{ name: data.name, questions: data.questions }] };
    loadBank(bankData);
  } catch(err) {
    showToast('加载失败：' + (err.message || '未知错误'));
  }
}

async function toggleBankPublic(bankId, currentlyPublic) {
  try {
    await apiCall('PATCH', '/api/banks/' + bankId, { is_public: !currentlyPublic });
    showToast(currentlyPublic ? '已取消公开' : '已公开分享');
    renderMyBanksTab();
  } catch(err) {
    showToast('操作失败：' + err.message);
  }
}

async function deleteBankById(bankId) {
  showConfirmDialog('删除题库', '确定要删除这个题库吗？此操作不可撤销。', async () => {
    try {
      await apiCall('DELETE', '/api/banks/' + bankId);
      showToast('已删除');
      renderMyBanksTab();
    } catch(err) {
      showToast('删除失败：' + err.message);
    }
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;

}

// === DASHBOARD ===

  APP.currentView = 'dashboard';

  const bank = APP.bank;
  if (!bank || !bank.chapters || !Array.isArray(bank.chapters)) {
    APP.bank = DEMO_BANK;
    return renderDashboard();
  }
  const results = getAllResults();
  const day = getDayOfCycle();

  // Compute stats
  let totalDone = 0, totalCorrect = 0, totalQ = 0;
  Object.values(results).forEach(r => {
    totalDone++;
    totalCorrect += r.score;
    totalQ += r.total;
  });
  const avgAcc = totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) : 0;
  const streak = getStreak();

  // Check if all chapters done today
  let todayAllDone = bank.chapters.length > 0;
  bank.chapters.forEach((_, ci) => {
    if (!getChapterTodayResult(ci)) todayAllDone = false;
  });

  // Per-chapter accuracy
  let chapterAccData = [];
  bank.chapters.forEach((ch, ci) => {
    let chCorrect = 0, chTotal = 0;
    for (let d = 0; d < 30; d++) {

      const r = results[key];
      if (r) { chCorrect += r.score; chTotal += r.total; }

    const acc = chTotal > 0 ? Math.round(chCorrect / chTotal * 100) : 0;

// === START EXAM ===
function startExam(chapterIdx) {
  if (!APP.bank || !APP.bank.chapters[chapterIdx]) {
    showToast('无效的章节');
    return;
  }
  const ch = APP.bank.chapters[chapterIdx];
  APP.currentChapter = chapterIdx;
  APP.dailyQuestions = getDailyQuestions(ch, chapterIdx);
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.isRandomMode = false;
  APP.isWrongPractice = false;
  APP.timedMode = false;
  APP.timeLimit = 0;
  APP.timeRemaining = 0;
  startTimer();
  renderExam();
}

// === TIMER ===
function startTimer() {
  APP.timerStart = Date.now();
  APP.timerInterval = setInterval(() => {
    APP.elapsed = Math.floor((Date.now() - APP.timerStart) / 1000);
    const el = document.getElementById('timer-display');
    if (el) el.textContent = formatTime(APP.elapsed);
  }, 1000);
}
function stopTimer() {
  clearInterval(APP.timerInterval);
  APP.timerInterval = null;
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// === RENDER EXAM ===
function renderExam() {
  const questions = APP.dailyQuestions;
  if (!questions || questions.length === 0) {
    showToast('没有可用的题目');
    renderDashboard();
    return;
  }
  if (APP.currentQ < 0 || APP.currentQ >= questions.length) {
    APP.currentQ = Math.max(0, Math.min(APP.currentQ, questions.length - 1));
  }
  const isRandom = APP.currentChapter === -1;
  const isWrongPractice = APP.currentChapter === -2;
  const isCustomBuilder = APP.currentChapter === -3;
  const isBookmarkPractice = APP.currentChapter === -4;
  const isWeakPractice = APP.currentChapter === -5;
  const chName = isRandom ? '随机练习' : isWrongPractice ? '错题重练' : isCustomBuilder ? '自定义组卷' : isBookmarkPractice ? '收藏练习' : isWeakPractice ? '针对性练习' : (APP.bank.chapters[APP.currentChapter] ? APP.bank.chapters[APP.currentChapter].name : '练习');
  const chLabel = isRandom ? 'RANDOM MODE' : isWrongPractice ? 'WRONG BOOK' : isCustomBuilder ? 'CUSTOM EXAM' : isBookmarkPractice ? 'BOOKMARK MODE' : isWeakPractice ? 'WEAK TOPICS' : `Chapter ${String(APP.currentChapter+1).padStart(2,'0')} · Day ${getDayOfCycle()+1}/30`;
  const q = questions[APP.currentQ];
  if (!q) { renderDashboard(); return; }
  const idx = APP.currentQ;
  const total = questions.length;

  // Pills
  let pillsHtml = '';
  questions.forEach((_, i) => {
    let cls = '';
    if (i === idx) cls = 'active';
    else if (APP.submitted) {
      cls = isCorrect(i) ? 'correct' : 'wrong';
    } else if (APP.flags.has(i)) cls = 'flagged';
    else if (APP.answers[i] !== undefined) cls = 'answered';
    pillsHtml += `<div class="q-pill ${cls}" data-qi="${i}">${i+1}</div>`;
  });

  // Type badge
  const typeMap = { single: '单选题', multi: '多选题', tf: '判断题', fill: '填空题' };
  const typeCls = q.type;

  // Options / input
  let bodyHtml = '';
  if (q.type === 'fill') {
    const val = APP.answers[idx] || '';
    bodyHtml = `<input class="q-fill-input" id="fill-input" placeholder="请输入答案…" value="${escHtml(val)}" ${APP.submitted ? 'disabled' : ''}>`;
    if (APP.submitted) {
      const correct = String(q.answer).trim().toLowerCase() === String(val).trim().toLowerCase();
      bodyHtml += `<div class="q-correct-note ${correct ? 'is-correct' : 'is-wrong'}">${correct ? '✓ 回答正确' : '✗ 回答错误 — 正确答案：' + escHtml(q.answer)}</div>`;
    }
  } else if (q.type === 'tf') {
    const opts = [{key:'true', label:'正确 (True)'}, {key:'false', label:'错误 (False)'}];
    bodyHtml = '<div class="q-options">';
    opts.forEach(o => {
      let cls = '';
      const sel = APP.answers[idx] === o.key;
      if (APP.submitted) {
        if (String(q.answer) === o.key) cls = 'correct-answer';
        if (sel && String(q.answer) !== o.key) cls = 'wrong-answer';
        if (sel && String(q.answer) === o.key) cls = 'correct-answer';
      } else if (sel) cls = 'selected';
      bodyHtml += `<div class="q-option ${cls}" data-val="${o.key}">
        <div class="q-option-letter">${o.key === 'true' ? 'T' : 'F'}</div>
        <div class="q-option-text">${o.label}</div>
      </div>`;
    });
    bodyHtml += '</div>';
  } else {
    // single / multi
    const letters = 'ABCDEFGHIJKLMNOP';
    bodyHtml = '<div class="q-options">';
    q.options.forEach((opt, oi) => {
      const letter = letters[oi];
      let cls = '';
      const isMulti = q.type === 'multi';
      const userAns = APP.answers[idx];
      const sel = isMulti ? (Array.isArray(userAns) && userAns.includes(letter)) : userAns === letter;
      const correctAns = q.answer;
      if (APP.submitted) {
        const isCorrectOpt = isMulti ? (Array.isArray(correctAns) && correctAns.includes(letter)) : correctAns === letter;
        if (isCorrectOpt) cls = 'correct-answer';
        if (sel && !isCorrectOpt) cls = 'wrong-answer';
      } else if (sel) cls = 'selected';
      bodyHtml += `<div class="q-option ${cls}" data-val="${letter}">
        <div class="q-option-letter">${letter}</div>
        <div class="q-option-text">${escHtml(opt)}</div>
      </div>`;
    });
    bodyHtml += '</div>';
  }

  // Explanation (only after submit)
  let explHtml = '';
  if (APP.submitted && q.explanation) {
    const correct = isCorrect(idx);
    const correctAnsDisplay = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
    explHtml = `
    <div class="q-explanation">
      <div class="q-explanation-title">&#128161; 答案解析</div>
      <div class="q-correct-note ${correct ? 'is-correct' : 'is-wrong'}" style="margin-bottom:10px">
        ${correct ? '✓ 回答正确' : '✗ 回答错误'} · 正确答案：${escHtml(String(correctAnsDisplay))}
      </div>
      <div class="q-explanation-text">${escHtml(q.explanation)}</div>
    </div>`;
  }

  // Actions
  const answered = Object.keys(APP.answers).length;
  let actionsHtml = '';
  if (!APP.submitted) {
    actionsHtml = `
    <div class="exam-actions">
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="btn-prev" ${idx === 0 ? 'disabled' : ''}>&#8592; 上一题</button>
        <button class="btn btn-sm" id="btn-next" ${idx === total-1 ? 'disabled' : ''}>下一题 &#8594;</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm ${APP.flags.has(idx) ? 'btn-flag' : ''}" id="btn-flag">
          &#9873; ${APP.flags.has(idx) ? '取消标记' : '标记复查'}
        </button>
        <button class="btn btn-primary btn-sm" id="btn-submit">
          &#10003; 交卷 (${answered}/${total})
        </button>
      </div>
    </div>`;
  } else {
    actionsHtml = `
    <div class="exam-actions">
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="btn-prev" ${idx === 0 ? 'disabled' : ''}>&#8592; 上一题</button>
        <button class="btn btn-sm" id="btn-next" ${idx === total-1 ? 'disabled' : ''}>下一题 &#8594;</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="btn-results">&#128202; 查看成绩</button>
        <button class="btn btn-sm" id="btn-export-annotations">&#128220; 导出复习笔记</button>
        <button class="btn btn-primary btn-sm" id="btn-back-home">&#8617; 返回首页</button>
      </div>
    </div>`;
  }

  const html = `
  <div class="page has-mobile-bar">
    <div class="exam-header">
      <div class="exam-title-area">
        <div class="exam-chapter-label">${chLabel}</div>
        <div class="exam-title">${escHtml(chName)}</div>
      </div>
      <div class="exam-meta">
        <div class="exam-timer${APP.timedMode && APP.timeRemaining <= 30 ? ' timer-countdown' : APP.timedMode && APP.timeRemaining <= 60 ? ' timer-warning' : ''}">&#9201; <span id="timer-display">${APP.timedMode ? formatTime(APP.timeRemaining || 0) : formatTime(APP.elapsed)}</span>${APP.timedMode ? ' <span style="font-size:0.7rem;opacity:0.6">限时</span>' : ''}</div>
        <div class="exam-progress-text">${idx+1} / ${total}</div>
        <button class="nav-btn" onclick="toggleFullscreen()" title="全屏模式" style="width:32px;height:32px;font-size:0.85rem">&#9974;</button>
      </div>
    </div>
    <div class="exam-progress-bar"><div class="exam-progress-fill" style="width:${Math.round(((idx+1)/total)*100)}%"></div></div>
    <div class="kbd-hints">
      <span><span class="kbd">1-4</span> 选择选项</span>
      <span><span class="kbd">&#8592;</span><span class="kbd">&#8594;</span> 切换题目</span>
      <span><span class="kbd">F</span> 标记/取消</span>
      <span><span class="kbd">Ctrl+Enter</span> 交卷</span>
    </div>
    <div class="q-nav">${pillsHtml}</div>
    <div class="q-card fade-up q-card-swipe">
      <button class="q-bookmark ${isBookmarked(q.id) ? 'bookmarked' : ''}" id="btn-bookmark" title="收藏此题">&#9733;</button>
      <span class="q-type-badge ${typeCls}">${typeMap[q.type] || q.type}</span>
      ${(() => { const diff = getQuestionDifficulty(q.id); return '<span class="difficulty-badge ' + diff.cls + '">' + diff.label + '</span>'; })()}
      <div class="q-text">${idx+1}. ${escHtml(q.question)}</div>
      ${bodyHtml}
      ${explHtml}
      <button class="q-report-btn" data-report-qid="${q.id}">&#128172; 反馈</button>
      ${APP.submitted ? (() => {
        if (!APP._reviewSessionId) APP._reviewSessionId = Date.now().toString(36);
        const annotKey = 'review_' + APP._reviewSessionId + '_' + q.id;
        const existingAnnot = getQNote(annotKey);
        return '<div class="review-annotation"><div class="review-annotation-label">&#128221; 复习批注</div><input class="review-annotation-input" id="review-annot-input" placeholder="记录你对这道题的复习心得…" value="' + escHtml(existingAnnot) + '" data-annot-key="' + annotKey + '"><div class="review-annotation-saved" id="annot-saved">&#10003; 已保存</div></div>';
      })() : ''}
      <div class="q-note-section">
        <div class="q-note-section-header" id="note-section-toggle">
          <span>&#128221; 我的笔记</span>
          <span class="note-indicator">${getQNote(q.id) ? '已有笔记 ▾' : '展开 ▾'}</span>
        </div>
        <div class="q-note-section-body ${getQNote(q.id) ? 'open' : ''}" id="note-section-body">
          <div class="q-note-section-body-inner">
            <textarea class="q-note-textarea" id="q-note-r8" placeholder="在此记录你的思考、助记、易错点…">${escHtml(getQNote(q.id))}</textarea>
            <div class="q-note-save-status" id="note-saved-r8">&#10003; 已保存</div>
          </div>
        </div>
      </div>
    </div>
    ${actionsHtml}
    <div class="mobile-exam-bar">
      ${!APP.submitted ? `
        <button class="btn btn-sm" id="mob-prev" ${idx === 0 ? 'disabled' : ''}>&#8592;</button>
        <button class="btn btn-sm" id="mob-flag" ${APP.flags.has(idx) ? 'style="color:var(--yellow);border-color:var(--yellow)"' : ''}>&#9873;</button>
        <button class="btn btn-primary btn-sm" id="mob-submit">&#10003; 交卷</button>
        <button class="btn btn-sm" id="mob-next" ${idx === total-1 ? 'disabled' : ''}>&#8594;</button>
      ` : `
        <button class="btn btn-sm" id="mob-prev" ${idx === 0 ? 'disabled' : ''}>&#8592;</button>
        <button class="btn btn-sm" id="mob-results">&#128202; 成绩</button>
        <button class="btn btn-primary btn-sm" id="mob-home">&#8617; 返回</button>
        <button class="btn btn-sm" id="mob-next" ${idx === total-1 ? 'disabled' : ''}>&#8594;</button>
      `}
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML = html;
  bindExamEvents();
}

function bindExamEvents() {
  // pill clicks
  document.querySelectorAll('.q-pill').forEach(el => {
    el.addEventListener('click', () => {
      APP.currentQ = parseInt(el.dataset.qi);
      renderExam();
    });
  });
  // option clicks
  if (!APP.submitted) {
    document.querySelectorAll('.q-option').forEach(el => {
      el.addEventListener('click', () => {
        const val = el.dataset.val;
        const q = APP.dailyQuestions[APP.currentQ];
        if (q.type === 'multi') {
          let arr = APP.answers[APP.currentQ] || [];
          if (!Array.isArray(arr)) arr = [];
          if (arr.includes(val)) arr = arr.filter(v => v !== val);
          else arr.push(val);
          APP.answers[APP.currentQ] = arr.sort();
          renderExam();
        } else {
          APP.answers[APP.currentQ] = val;
          // Add pop animation
          el.classList.add('just-selected');
          renderExam();
          // Auto-advance for single/tf after short delay
          if (getSetting('autoAdvance', true) && (q.type === 'single' || q.type === 'tf') && APP.currentQ < APP.dailyQuestions.length - 1) {
            setTimeout(() => {
              APP.currentQ++;
              renderExam();
            }, 400);
          }
        }
      });
    });
    // fill input
    const fillInput = document.getElementById('fill-input');
    if (fillInput) {
      fillInput.addEventListener('input', (e) => {
        APP.answers[APP.currentQ] = e.target.value;
      });
      fillInput.focus();
    }
  }
  // buttons
  document.getElementById('btn-prev')?.addEventListener('click', () => {
    if (APP.currentQ > 0) { APP.currentQ--; renderExam(); }
  });
  document.getElementById('btn-next')?.addEventListener('click', () => {
    if (APP.currentQ < APP.dailyQuestions.length - 1) { APP.currentQ++; renderExam(); }
  });
  document.getElementById('btn-flag')?.addEventListener('click', () => {
    if (APP.flags.has(APP.currentQ)) APP.flags.delete(APP.currentQ);
    else APP.flags.add(APP.currentQ);
    renderExam();
  });
  document.getElementById('btn-submit')?.addEventListener('click', submitExam);
  document.getElementById('btn-results')?.addEventListener('click', renderResults);
  document.getElementById('btn-back-home')?.addEventListener('click', () => { renderDashboard(); });
  // Mobile bar
  document.getElementById('mob-prev')?.addEventListener('click', () => {
    if (APP.currentQ > 0) { APP.currentQ--; renderExam(); }
  });
  document.getElementById('mob-next')?.addEventListener('click', () => {
    if (APP.currentQ < APP.dailyQuestions.length - 1) { APP.currentQ++; renderExam(); }
  });
  document.getElementById('mob-flag')?.addEventListener('click', () => {
    if (APP.flags.has(APP.currentQ)) APP.flags.delete(APP.currentQ);
    else APP.flags.add(APP.currentQ);
    renderExam();
  });
  document.getElementById('mob-submit')?.addEventListener('click', submitExam);
  document.getElementById('mob-results')?.addEventListener('click', renderResults);
  document.getElementById('mob-home')?.addEventListener('click', renderDashboard);
  // Bookmark
  document.getElementById('btn-bookmark')?.addEventListener('click', () => {
    const q = APP.dailyQuestions[APP.currentQ];
    toggleBookmark(q.id);
    playSound('click');
    renderExam();
  });
  // Notes: collapsible toggle and auto-save
  document.getElementById('note-section-toggle')?.addEventListener('click', () => {
    const body = document.getElementById('note-section-body');
    if (body) body.classList.toggle('open');
  });
  let noteTimer;
  document.getElementById('q-note-r8')?.addEventListener('input', (e) => {
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => {
      const q = APP.dailyQuestions[APP.currentQ];
      saveQNote(q.id, e.target.value);
      // Also save to old notes system for backward compat
      saveNote(q.id, e.target.value);
      const saved = document.getElementById('note-saved-r8');
      if (saved) { saved.classList.add('show'); setTimeout(() => saved.classList.remove('show'), 1500); }
    }, 600);
  });
  // Round 9: Report button
  document.querySelectorAll('[data-report-qid]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showReportModal(el.dataset.reportQid);
    });
  });
  // Round 9: Review annotation auto-save
  let annotTimer;
  document.getElementById('review-annot-input')?.addEventListener('input', (e) => {
    clearTimeout(annotTimer);
    annotTimer = setTimeout(() => {
      const key = e.target.dataset.annotKey;
      if (key) {
        saveQNote(key, e.target.value);
        const savedEl = document.getElementById('annot-saved');
        if (savedEl) { savedEl.style.display = 'block'; setTimeout(() => savedEl.style.display = 'none', 1500); }
      }
    }, 600);
  });
  // Round 9: Export annotations button
  document.getElementById('btn-export-annotations')?.addEventListener('click', exportReviewAnnotations);
}

function isCorrect(qi) {
  const q = APP.dailyQuestions[qi];
  if (!q) return false;
  const userAns = APP.answers[qi];
  if (userAns === undefined || userAns === null) return false;
  if (q.type === 'fill') {
    return String(q.answer).trim().toLowerCase() === String(userAns || '').trim().toLowerCase();
  }
  if (q.type === 'multi') {
    const correct = Array.isArray(q.answer) ? [...q.answer].sort() : [q.answer];
    const user = Array.isArray(userAns) ? [...userAns].sort() : [];
    return JSON.stringify(correct) === JSON.stringify(user);
  }
  return String(q.answer) === String(userAns);
}

function submitExam() {
  const unanswered = APP.dailyQuestions.length - Object.keys(APP.answers).length;
  if (unanswered > 0) {
    showConfirmDialog(
      `还有 ${unanswered} 题未作答`,
      '确定要交卷吗？未作答的题目将被判为错误。',
      doSubmit
    );
  } else {
    showConfirmDialog(
      '确认交卷',
      `已完成全部 ${APP.dailyQuestions.length} 题，确定提交吗？`,
      doSubmit
    );
  }
}

function doSubmit() {
  stopTimer();
  APP.submitted = true;
  const score = APP.dailyQuestions.reduce((s, _, i) => s + (isCorrect(i) ? 1 : 0), 0);
  const pct = Math.round(score / APP.dailyQuestions.length * 100);
  // Only save to daily results if it's a regular chapter exam
  if (APP.currentChapter >= 0) {
    saveResult(APP.currentChapter, score, APP.dailyQuestions.length, APP.elapsed);
  }
  // Always save wrong answers
  saveWrongAnswers();
  // Update per-question stats
  APP.dailyQuestions.forEach((q, i) => {
    updateQuestionStats(q.id, isCorrect(i));
  });
  // Sound feedback
  if (pct >= 80) playSound('correct');
  else playSound('wrong');
  // Force immediate save of all pending data
  flushPendingSaves();
  renderResults('all');
}

function showConfirmDialog(title, sub, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box" style="max-width:400px">
    <div class="confirm-dialog">
      <p>${escHtml(title)}</p>
      <div class="sub">${escHtml(sub)}</div>
      <div class="confirm-actions">
        <button class="btn" id="confirm-cancel">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定交卷</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirm-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#confirm-ok').addEventListener('click', () => {
    overlay.remove();
    onConfirm();
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// === RESULTS ===
function renderResults(filter) {
  APP.currentView = 'result';
  if (!filter) filter = 'all'; // 'all', 'wrong', 'correct'
  const questions = APP.dailyQuestions;
  const total = questions.length;
  const score = questions.reduce((s, _, i) => s + (isCorrect(i) ? 1 : 0), 0);
  const pct = Math.round(score / total * 100);
  const isRandom = APP.currentChapter === -1;
  const isWrongPractice = APP.currentChapter === -2;
  const isCustomBuilder = APP.currentChapter === -3;
  const isBookmarkPractice = APP.currentChapter === -4;
  const isWeakPractice = APP.currentChapter === -5;
  const chName = isRandom ? '随机练习' : isWrongPractice ? '错题重练' : isCustomBuilder ? '自定义组卷' : isBookmarkPractice ? '收藏练习' : isWeakPractice ? '针对性练习' : (APP.bank.chapters[APP.currentChapter] ? APP.bank.chapters[APP.currentChapter].name : '练习');

  // Score ring colors
  const ringColor = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
  const circumference = 2 * Math.PI * 72;
  const dashOffset = circumference * (1 - pct / 100);

  // Filter questions
  const filtered = questions.map((q, i) => ({q, i})).filter(({i}) => {
    if (filter === 'wrong') return !isCorrect(i);
    if (filter === 'correct') return isCorrect(i);
    return true;
  });

  // Detail list
  let detailHtml = '';
  filtered.forEach(({q, i}, fi) => {
    const correct = isCorrect(i);
    const userAns = APP.answers[i];
    const correctAns = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
    const userAnsDisplay = Array.isArray(userAns) ? userAns.join(', ') : (userAns || '未作答');
    const typeMap = { single: '单选', multi: '多选', tf: '判断', fill: '填空' };

    detailHtml += `
    <div class="q-card fade-up" style="animation-delay:${fi*0.03}s">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span class="q-type-badge ${q.type}">${typeMap[q.type]}</span>
        <span class="q-correct-note ${correct ? 'is-correct' : 'is-wrong'}" style="margin:0">
          ${correct ? '&#10003; 正确' : '&#10007; 错误'}
        </span>
        <span style="font-size:0.75rem;color:var(--text-muted);margin-left:auto">第 ${i+1} 题</span>
      </div>
      <div class="q-text" style="margin-bottom:16px">${i+1}. ${escHtml(q.question)}</div>
      <div style="display:flex;gap:24px;font-size:0.88rem;margin-bottom:12px;flex-wrap:wrap">
        <div><span style="color:var(--text-muted)">你的答案：</span><span style="color:${correct ? 'var(--green)' : 'var(--red)'};font-weight:600">${escHtml(userAnsDisplay)}</span></div>
        <div><span style="color:var(--text-muted)">正确答案：</span><span style="color:var(--green);font-weight:600">${escHtml(String(correctAns))}</span></div>
      </div>
      ${q.explanation ? `<div class="q-explanation">
        <div class="q-explanation-title">&#128161; 答案解析</div>
        <div class="q-explanation-text">${escHtml(q.explanation)}</div>
      </div>` : ''}
    </div>`;
  });

  if (filtered.length === 0) {
    detailHtml = `<div class="q-card" style="text-align:center;padding:40px;color:var(--text-muted)">
      ${filter === 'wrong' ? '&#127881; 没有错题，全部正确！' : '没有符合条件的题目'}
    </div>`;
  }

  const wrongCount = questions.filter((_, i) => !isCorrect(i)).length;

  const html = `
  <div class="page">
    <div class="result-hero fade-up">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 160 160">
          <circle class="score-ring-bg" cx="80" cy="80" r="72"/>
          <circle class="score-ring-fill" cx="80" cy="80" r="72"
            stroke="${ringColor}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            id="score-ring-anim"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-ring-pct" style="color:${ringColor}">${pct}%</div>
          <div class="score-ring-label">${score} / ${total}</div>
        </div>
      </div>
      <div class="result-label">${escHtml(chName)} · ${isRandom || isWrongPractice || isCustomBuilder || isBookmarkPractice || isWeakPractice ? '本次练习' : '第 ' + (getDayOfCycle()+1) + ' 天练习'}</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--green)">${score}</div>
          <div class="result-stat-label">正确</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--red)">${total - score}</div>
          <div class="result-stat-label">错误</div>
        </div>

// === RANDOM PRACTICE ===
function startRandomPractice() {
  const bank = APP.bank;
  // Pool all questions from all chapters
  const allQ = [];
  bank.chapters.forEach((ch, ci) => {
    ch.questions.forEach(q => allQ.push({...q, _chapterName: ch.name, _chapterIdx: ci}));
  });
  if (allQ.length < 5) {
    showToast('题库题目不足，请先导入更多题目');
    return;
  }
  // Shuffle with random seed
  for (let i = allQ.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
  }
  APP.currentChapter = -1; // special marker for random mode
  const qCount = getSetting('randomQCount', 10);
  APP.dailyQuestions = allQ.slice(0, Math.min(qCount, allQ.length));
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.isRandomMode = true;
  startTimer();
  renderExam();
}

// === SAVE WRONG ANSWERS ===
function saveWrongAnswers() {
  if (!APP.dailyQuestions || !APP.submitted) return;
  const data = getStorage();
  if (!data.wrongBook) data.wrongBook = [];
  const date = new Date().toISOString().slice(0,10);
  const ch = APP.currentChapter >= 0 ? APP.bank.chapters[APP.currentChapter] : null;
  const chName = ch ? ch.name : (APP.currentChapter === -1 ? '随机练习' : APP.currentChapter === -2 ? '错题重练' : APP.currentChapter === -3 ? '自定义组卷' : APP.currentChapter === -4 ? '收藏练习' : APP.currentChapter === -5 ? '针对性练习' : '练习');
  APP.dailyQuestions.forEach((q, i) => {
    if (!isCorrect(i)) {
      const userAns = APP.answers[i];
      // Check if already exists to avoid duplicates
      const exists = data.wrongBook.some(w => w.id === q.id && w.date === date);
      if (!exists) {
        data.wrongBook.push({
          id: q.id,
          question: q.question,
          type: q.type,
          options: q.options,
          answer: q.answer,
          explanation: q.explanation,
          userAnswer: userAns,
          chapterName: chName,
          date: date,
        });
      }
    }
  });
  // Keep only last 200 entries
  if (data.wrongBook.length > 200) {
    data.wrongBook = data.wrongBook.slice(-200);
  }
  saveStorage(data);
}

// === WRONG BOOK PAGE ===
function renderWrongBook(tab, searchTerm) {
  APP.currentView = 'wrongbook';

    const bmarks = getBookmarks();

      const correctAns = Array.isArray(w.answer) ? w.answer.join(', ') : w.answer;

      contentHtml += `
      <div class="wrong-book-q fade-up" style="animation-delay:${Math.min(wi,20)*0.02}s">
        <div class="wrong-book-q-head">
          <span class="q-type-badge ${w.type}">${typeMap[w.type] || w.type}</span>

          <div><span style="color:var(--text-muted)">正确答案：</span><span style="color:var(--green);font-weight:600">${escHtml(String(correctAns))}</span></div>
        </div>
        ${w.explanation ? `<div class="q-explanation" style="margin-top:8px">
          <div class="q-explanation-title">&#128161; 解析</div>
          <div class="q-explanation-text">${escHtml(w.explanation)}</div>
        </div>` : ''}
      </div>`;
    });
  }

  const wrongCount = wrongBook.length;
  const cachedBookmarks = getBookmarks();
  const bookmarkCount = cachedBookmarks.length;

  const html = `
  <div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:1.4rem;font-weight:700">&#128213; ${tab === 'wrong' ? '错题本' : '收藏夹'}</div>
        <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">共 ${filtered.length} 道题目</div>
      </div>

        ${tab === 'wrong' && wrongCount > 0 ? `<button class="btn btn-sm" id="btn-practice-wrong">&#128170; 错题重练</button>` : ''}
        ${tab === 'wrong' && wrongCount > 0 ? `<button class="btn btn-sm" id="btn-clear-wrong" style="color:var(--red);border-color:var(--red)">&#128465; 清空</button>` : ''}
        ${tab === 'bookmarks' && bookmarkCount > 0 ? `<button class="btn btn-sm" id="btn-practice-bookmarks" style="color:var(--yellow);border-color:var(--yellow)">&#9733; 开始收藏练习</button>` : ''}
        <button class="btn btn-sm btn-primary" id="btn-wrong-home">&#8617; 返回</button>
      </div>

    <div class="tab-nav" style="margin-bottom:20px">
      <div class="tab-btn ${tab==='wrong'?'active':''}" data-tab="wrong">&#10007; 错题 (${wrongCount})</div>

  if (searchTerm) {

    if (si) { si.focus(); si.setSelectionRange(searchTerm.length, searchTerm.length); }
  }

// === PRACTICE WRONG QUESTIONS ===
function startWrongPractice() {
  const data = getStorage();
  const wrongBook = data.wrongBook || [];
  if (wrongBook.length === 0) {
    showToast('错题本是空的');
    return;
  }
  // Shuffle and pick up to 10
  const pool = [...wrongBook];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const selected = pool.slice(0, Math.min(10, pool.length));
  APP.currentChapter = -2; // marker for wrong practice mode
  APP.dailyQuestions = selected;
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.isRandomMode = false;
  APP.isWrongPractice = true;
  startTimer();
  renderExam();
}

// === EXPORT RESULTS ===
function exportResults() {
  const data = getStorage();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `exam_results_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('练习记录已导出');
}

      </div>
    </div>
    <div style="margin-top:24px;text-align:center">
      <button class="btn btn-primary" id="mode-start" style="min-width:180px">&#9654; 开始练习</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  let selectedMode = 'normal';
  let selectedTime = 300;

  overlay.getElementById = (id) => overlay.querySelector('#' + id);
  overlay.querySelector('#mode-normal').addEventListener('click', () => {
    selectedMode = 'normal';
    overlay.querySelector('#mode-normal').classList.add('active');
    overlay.querySelector('#mode-timed').classList.remove('active');
    overlay.querySelector('#time-select-area').style.display = 'none';
  });
  overlay.querySelector('#mode-timed').addEventListener('click', () => {
    selectedMode = 'timed';
    overlay.querySelector('#mode-timed').classList.add('active');
    overlay.querySelector('#mode-normal').classList.remove('active');
    overlay.querySelector('#time-select-area').style.display = 'block';
  });
  overlay.querySelectorAll('.time-option').forEach(el => {
    el.addEventListener('click', () => {
      selectedTime = parseInt(el.dataset.time);
      overlay.querySelectorAll('.time-option').forEach(o => o.classList.remove('active'));
      el.classList.add('active');
    });
  });
  overlay.querySelector('#mode-start').addEventListener('click', () => {
    overlay.remove();
    if (selectedMode === 'timed') {
      startTimedExam(chapterIdx, selectedTime);
    } else {
      startExam(chapterIdx);
    }
  });
}

// === TIMED EXAM ===
function startTimedExam(chapterIdx, timeLimit) {
  if (!APP.bank || !APP.bank.chapters[chapterIdx]) {
    showToast('无效的章节');
    return;
  }
  const ch = APP.bank.chapters[chapterIdx];
  APP.currentChapter = chapterIdx;
  APP.dailyQuestions = getDailyQuestions(ch, chapterIdx);
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.isRandomMode = false;
  APP.isWrongPractice = false;
  APP.timedMode = true;
  APP.timeLimit = timeLimit;
  APP.timeRemaining = timeLimit;
  startCountdownTimer();
  renderExam();
}

function startCountdownTimer() {
  APP.timerStart = Date.now();
  APP.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - APP.timerStart) / 1000);
    APP.elapsed = elapsed;
    APP.timeRemaining = Math.max(0, APP.timeLimit - elapsed);
    const el = document.getElementById('timer-display');
    if (el) {
      el.textContent = formatTime(APP.timeRemaining);
      // Color coding
      el.parentElement.className = 'exam-timer';
      if (APP.timeRemaining <= 30) {
        el.parentElement.classList.add('timer-countdown');
      } else if (APP.timeRemaining <= 60) {
        el.parentElement.className = 'exam-timer timer-warning';
      }
    }
    if (APP.timeRemaining <= 0 && !APP.submitted) {
      stopTimer();
      APP.submitted = true;
      const score = APP.dailyQuestions.reduce((s, _, i) => s + (isCorrect(i) ? 1 : 0), 0);
      if (APP.currentChapter >= 0) {
        saveResult(APP.currentChapter, score, APP.dailyQuestions.length, APP.elapsed);
      }
      saveWrongAnswers();
      APP.dailyQuestions.forEach((q, i) => {
        updateQuestionStats(q.id, isCorrect(i));
      });
      playSound('wrong');
      showToast('时间到！已自动交卷');
      renderResults('all');
    }
  }, 1000);
}

// === QUESTION BANK EXPLORER ===
function renderExplorer(filterChapter, searchTerm, filterTag) {
  APP.currentView = 'explorer';
  stopTimer();
  if (filterChapter === undefined) filterChapter = -1; // all
  if (!searchTerm) searchTerm = '';
  if (!filterTag) filterTag = '';
  const bank = APP.bank;

  // Gather all questions
  let allQ = [];
  bank.chapters.forEach((ch, ci) => {
    ch.questions.forEach(q => {
      allQ.push({...q, _chapterName: ch.name, _chapterIdx: ci});
    });
  });

  // Filter
  let filtered = allQ;
  if (filterChapter >= 0) {
    filtered = filtered.filter(q => q._chapterIdx === filterChapter);
  }
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(q =>
      q.question.toLowerCase().includes(term) ||
      (q.explanation && q.explanation.toLowerCase().includes(term))
    );
  }
  // Round 9: Tag filter
  const allTags = getAllUsedTags();
  const qtagsAll = getQTags();
  if (filterTag) {
    filtered = filtered.filter(q => (qtagsAll[q.id] || []).includes(filterTag));
  }

  const typeMap = { single: '单选', multi: '多选', tf: '判断', fill: '填空' };
  const letters = 'ABCDEFGH';

  // Cache expensive lookups for the render loop
  const cachedBookmarks = getBookmarks();
  const cachedQStats = getQuestionStats();
  const cachedStorage = getStorage();
  const cachedWrongBook = cachedStorage.wrongBook || [];
  const cachedNotes = getQNotes();

  // Cached version of difficulty for this render pass
  function getCachedDifficulty(qId) {
    const count = cachedWrongBook.filter(w => w.id === qId).length;
    const s = cachedQStats[qId];
    let statScore = 0;
    if (s && s.seen >= 2) {
      const pct = s.correct / s.seen;
      if (pct < 0.4) statScore = 2;
      else if (pct < 0.7) statScore = 1;
    }
    const combined = count + statScore;
    if (combined >= 3) return { label: '困难', cls: 'hard' };
    if (combined >= 1) return { label: '中等', cls: 'medium' };
    return { label: '简单', cls: 'easy' };
  }
  function getCachedStatDisplay(qId) {
    const s = cachedQStats[qId];
    if (!s || s.seen === 0) return '';
    const pct = Math.round(s.correct / s.seen * 100);
    const cls = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'bad';
    return '<div class="q-stats-indicator">正确率: <span class="' + cls + '">' + pct + '%</span> (' + s.correct + '/' + s.seen + ')</div>';
  }

  let listHtml = '';
  filtered.forEach((q, qi) => {
    const bm = cachedBookmarks.includes(q.id);
    const diff = getCachedDifficulty(q.id);
    const correctAns = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
    let optsHtml = '';
    if (q.options) {
      optsHtml = '<div class="explorer-opts">';
      q.options.forEach((opt, oi) => {
        const letter = letters[oi];
        const isAns = Array.isArray(q.answer) ? q.answer.includes(letter) : q.answer === letter;
        optsHtml += `<div class="explorer-opt ${isAns ? 'is-answer' : ''}">${letter}. ${escHtml(opt)}</div>`;
      });
      optsHtml += '</div>';
    } else if (q.type === 'tf') {
      optsHtml = `<div class="explorer-opts">
        <div class="explorer-opt ${q.answer === 'true' ? 'is-answer' : ''}">T 正确</div>
        <div class="explorer-opt ${q.answer === 'false' ? 'is-answer' : ''}">F 错误</div>
      </div>`;
    }

    listHtml += `
    <div class="explorer-card fade-up" style="animation-delay:${Math.min(qi, 15)*0.02}s">
      <div class="explorer-meta">
        <span class="q-type-badge ${q.type}">${typeMap[q.type]}</span>
        <span class="difficulty-badge ${diff.cls}">${diff.label}</span>
        <span style="font-size:0.72rem;color:var(--text-muted)">${escHtml(q._chapterName)}</span>
        <span style="font-size:0.72rem;color:var(--text-muted);margin-left:auto">${bm ? '&#9733;' : ''}${(cachedNotes[q.id]) ? '<span class="explorer-note-icon" title="已有笔记">&#128221;</span>' : ''}</span>
      </div>
      <div class="explorer-q-text">${escHtml(q.question)}</div>
      ${getCachedStatDisplay(q.id)}
      ${(() => {
        const qt = qtagsAll[q.id] || [];
        let tagsHtml = '<div class="q-tags-row">';
        qt.forEach(t => { tagsHtml += '<span class="q-tag">' + escHtml(t) + ' <span class="tag-remove" data-tag-qid="' + q.id + '" data-tag-name="' + escHtml(t) + '">&times;</span></span>'; });
        tagsHtml += '<button class="q-tag-add" data-addtag-qid="' + q.id + '" data-addtag-idx="' + qi + '">+ 标签</button></div>';
        return tagsHtml;
      })()}
      ${optsHtml}
      <div style="margin-top:8px;display:flex;align-items:center">
        <button class="explorer-toggle" data-eid="${qi}">&#9660; 显示答案与解析</button>
        <button class="q-report-btn" data-report-qid="${q.id}">&#128172; 反馈</button>
      </div>
      <div class="explorer-collapse" id="exp-${qi}">
        <div style="padding:12px 0">
          <div style="font-size:0.82rem;margin-bottom:6px"><span style="color:var(--text-muted)">正确答案：</span><span style="color:var(--green);font-weight:600">${escHtml(String(correctAns))}</span></div>
          ${q.explanation ? `<div class="q-explanation" style="margin-top:8px">
            <div class="q-explanation-title">&#128161; 解析</div>
            <div class="q-explanation-text">${escHtml(q.explanation)}</div>
          </div>` : ''}
          ${(cachedNotes[q.id]) ? '<div class="explorer-note-text">&#128221; ' + escHtml(cachedNotes[q.id]) + '</div>' : ''}
        </div>
      </div>
    </div>`;
  });

  if (filtered.length === 0) {
    listHtml = '<div style="text-align:center;padding:48px;color:var(--text-muted)">没有找到匹配的题目</div>';
  }

  // Chapter filter tabs
  let chTabsHtml = `<div class="filter-btn ${filterChapter===-1?'active':''}" data-fch="-1">全部 (${allQ.length})</div>`;
  bank.chapters.forEach((ch, ci) => {
    chTabsHtml += `<div class="filter-btn ${filterChapter===ci?'active':''}" data-fch="${ci}">${escHtml(ch.name)} (${ch.questions.length})</div>`;
  });

  const html = `
  <div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:1.4rem;font-weight:700">&#128218; 题库浏览器</div>
        <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">共 ${allQ.length} 题 · 显示 ${filtered.length} 题</div>
      </div>
      <button class="btn btn-sm btn-primary" id="btn-exp-home">&#8617; 返回</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="exp-search" placeholder="搜索题目或解析关键词…" value="${escHtml(searchTerm)}">
    </div>
    <div class="error-filter-bar" style="margin-bottom:20px;flex-wrap:wrap">${chTabsHtml}</div>
    ${allTags.length > 0 ? '<div class="tag-filter-bar"><div class="tag-filter-chip ' + (!filterTag ? 'active' : '') + '" data-ftag="">全部标签</div>' + allTags.map(t => '<div class="tag-filter-chip ' + (filterTag === t ? 'active' : '') + '" data-ftag="' + escHtml(t) + '">' + escHtml(t) + '</div>').join('') + '</div>' : ''}
    <div class="q-card" style="padding:0;overflow:hidden">
      ${listHtml}
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML = html;
  document.getElementById('btn-exp-home')?.addEventListener('click', renderDashboard);

  // Search
  let sTimer;
  document.getElementById('exp-search')?.addEventListener('input', (e) => {
    clearTimeout(sTimer);
    sTimer = setTimeout(() => renderExplorer(filterChapter, e.target.value, filterTag), 300);
  });
  if (searchTerm) {
    const si = document.getElementById('exp-search');
    if (si) { si.focus(); si.setSelectionRange(searchTerm.length, searchTerm.length); }
  }

  // Chapter filter
  document.querySelectorAll('[data-fch]').forEach(el => {
    el.addEventListener('click', () => renderExplorer(parseInt(el.dataset.fch), searchTerm, filterTag));
  });

  // Round 9: Tag filter chips
  document.querySelectorAll('[data-ftag]').forEach(el => {
    el.addEventListener('click', () => renderExplorer(filterChapter, searchTerm, el.dataset.ftag || ''));
  });

  // Round 9: Tag add buttons
  document.querySelectorAll('[data-addtag-qid]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const qId = el.dataset.addtagQid;
      const row = el.closest('.q-tags-row');
      if (!row || row.querySelector('.tag-inline-input')) return;
      const suggested = ['重点', '易错', '需复习', '已掌握'];
      const container = document.createElement('span');
      container.style.display = 'inline-flex';
      container.style.alignItems = 'center';
      container.style.gap = '4px';
      container.style.flexWrap = 'wrap';
      const input = document.createElement('input');
      input.className = 'tag-inline-input';
      input.placeholder = '输入标签';
      container.appendChild(input);
      suggested.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'q-tag-add';
        chip.textContent = s;
        chip.style.cursor = 'pointer';
        chip.addEventListener('click', () => { addQTag(qId, s); renderExplorer(filterChapter, searchTerm, filterTag); });
        container.appendChild(chip);
      });
      row.insertBefore(container, el);
      el.style.display = 'none';
      input.focus();
      input.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' && input.value.trim()) {
          addQTag(qId, input.value.trim());
          renderExplorer(filterChapter, searchTerm, filterTag);
        } else if (ev.key === 'Escape') {
          container.remove();
          el.style.display = '';
        }
      });
      input.addEventListener('blur', () => { setTimeout(() => { container.remove(); el.style.display = ''; }, 200); });
    });
  });

  // Round 9: Tag remove
  document.querySelectorAll('[data-tag-qid]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      removeQTag(el.dataset.tagQid, el.dataset.tagName);
      renderExplorer(filterChapter, searchTerm, filterTag);
    });
  });

  // Round 9: Report buttons in explorer
  document.querySelectorAll('[data-report-qid]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showReportModal(el.dataset.reportQid);
    });
  });

  // Collapse toggles
  document.querySelectorAll('.explorer-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.eid;
      const col = document.getElementById('exp-' + id);
      if (col) {
        col.classList.toggle('open');
        el.innerHTML = col.classList.contains('open') ? '&#9650; 隐藏答案与解析' : '&#9660; 显示答案与解析';
      }
    });
  });
}

// === ANALYTICS PAGE ===
function renderAnalytics() {
  APP.currentView = 'analytics';
  stopTimer();
  const bank = APP.bank;
  const results = getAllResults();
  const streak = getStreak();
  const unlocked = getUnlockedAchievements();

  // Compute overall stats
  let totalDone = 0, totalCorrect = 0, totalQ = 0, totalTime = 0;
  Object.values(results).forEach(r => {
    totalDone++;
    totalCorrect += r.score;
    totalQ += r.total;
    totalTime += (r.elapsed || 0);
  });
  const avgAcc = totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) : 0;
  const avgTime = totalDone > 0 ? Math.round(totalTime / totalDone) : 0;

  // Per-day heatmap
  let heatmapHtml = '';
  for (let d = 0; d < 30; d++) {
    let dayScore = 0, dayTotal = 0, dayCount = 0;
    bank.chapters.forEach((_, ci) => {
      const r = results[`ch${ci}_d${d}`];
      if (r) { dayScore += r.score; dayTotal += r.total; dayCount++; }
    });
    const pct = dayTotal > 0 ? Math.round(dayScore / dayTotal * 100) : -1;
    let bg = 'var(--bg-input)';
    if (pct >= 90) bg = 'var(--green)';
    else if (pct >= 70) bg = 'rgba(34,197,94,0.5)';
    else if (pct >= 50) bg = 'var(--yellow)';
    else if (pct >= 0) bg = 'var(--red)';
    const tip = pct >= 0 ? `D${d+1}: ${pct}% (${dayCount}场)` : `D${d+1}: 未练习`;
    heatmapHtml += `<div class="heatmap-cell" style="background:${bg}" data-tip="${tip}"></div>`;
  }

  // Score history chart (all results sorted by date)
  const sortedResults = Object.entries(results)
    .map(([k, v]) => ({...v, key: k}))
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const last20 = sortedResults.slice(-20);
  let historyChartHtml = '';
  let historyLabelsHtml = '';
  if (last20.length > 0) {
    last20.forEach((r, i) => {
      const pct = Math.round(r.score / r.total * 100);
      const h = Math.max(6, pct * 1.1);
      const col = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';
      historyChartHtml += `<div class="analytics-bar" style="height:${h}px;background:${col}" data-tip="${pct}% · ${r.date || ''}"></div>`;
      if (i % 4 === 0 || i === last20.length - 1) {
        historyLabelsHtml += `<div class="analytics-x-label">${r.date ? r.date.slice(5) : ''}</div>`;
      } else {
        historyLabelsHtml += `<div class="analytics-x-label"></div>`;
      }
    });
  } else {
    historyChartHtml = '<div style="width:100%;text-align:center;padding:40px 0;color:var(--text-muted);font-size:0.82rem">暂无练习数据</div>';
  }

  // Per-chapter comparison
  let chCompareHtml = '';
  bank.chapters.forEach((ch, ci) => {
    let chC = 0, chT = 0, chCount = 0;
    for (let d = 0; d < 30; d++) {
      const r = results[`ch${ci}_d${d}`];
      if (r) { chC += r.score; chT += r.total; chCount++; }
    }
    const acc = chT > 0 ? Math.round(chC / chT * 100) : 0;
    const barW = Math.max(4, acc);
    const col = acc >= 80 ? 'var(--green)' : acc >= 60 ? 'var(--yellow)' : acc > 0 ? 'var(--red)' : 'var(--border-strong)';
    chCompareHtml += `
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span style="font-weight:600">${escHtml(ch.name)}</span>
        <span style="font-family:var(--font-mono);color:${col};font-weight:700">${chT > 0 ? acc + '%' : '—'}</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${col};border-radius:4px;transition:width 0.6s ease"></div>
      </div>
      <div style="font-size:0.68rem;color:var(--text-muted);margin-top:3px">${chCount} 次练习 · ${chT} 题</div>
    </div>`;
  });

  // Achievements
  let achieveHtml = '';
  ACHIEVEMENTS.forEach(a => {
    const isUnlocked = unlocked.includes(a.id);
    achieveHtml += `
    <div class="achievement ${isUnlocked ? 'unlocked' : 'locked'} fade-up">
      <div class="achievement-icon">${a.icon}</div>
      <div class="achievement-name">${a.name}</div>
      <div class="achievement-desc">${a.desc}</div>
      ${isUnlocked ? '<div class="achievement-date">&#10003; 已解锁</div>' : ''}
    </div>`;
  });

  const html = `
  <div class="page">

function renderTimeDistribution(sortedResults) {
  if (sortedResults.length === 0) {
    return '<div style="color:var(--text-muted);font-size:0.85rem;padding:20px 0">暂无数据</div>';
  }
  // Group by time ranges
  const buckets = [
    { label: '<3分', max: 180, count: 0 },
    { label: '3-5分', max: 300, count: 0 },
    { label: '5-10分', max: 600, count: 0 },
    { label: '10-15分', max: 900, count: 0 },
    { label: '>15分', max: Infinity, count: 0 },
  ];
  sortedResults.forEach(r => {
    const t = r.elapsed || 0;
    for (const b of buckets) {
      if (t < b.max) { b.count++; break; }
    }
  });
  const maxCount = Math.max(...buckets.map(b => b.count), 1);
  let html = '<div style="display:flex;align-items:flex-end;gap:8px;height:80px;margin-bottom:8px">';
  buckets.forEach(b => {
    const h = Math.max(4, (b.count / maxCount) * 72);
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
      <div style="font-size:0.68rem;font-family:var(--font-mono);font-weight:600;color:var(--text-secondary);margin-bottom:4px">${b.count}</div>
      <div style="width:100%;max-width:40px;height:${h}px;background:var(--blue);border-radius:4px 4px 0 0;transition:height 0.5s ease"></div>
    </div>`;
  });
  html += '</div><div style="display:flex;gap:8px">';
  buckets.forEach(b => {
    html += `<div style="flex:1;text-align:center;font-size:0.62rem;color:var(--text-muted);font-family:var(--font-mono)">${b.label}</div>`;
  });
  html += '</div>';
  return html;
}

// === CSV IMPORT ===
function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) throw new Error('CSV至少需要2行（表头+数据）');

  const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
  // Expected: chapter, type, question, options (semicolon separated), answer, explanation
  const reqFields = ['question', 'answer'];
  reqFields.forEach(f => {
    if (!headers.includes(f)) throw new Error('缺少必要列: ' + f);
  });

  const chapMap = {};
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    const row = {};
    headers.forEach((h, hi) => { row[h] = (vals[hi] || '').trim(); });

    const chName = row.chapter || '默认章节';
    if (!chapMap[chName]) chapMap[chName] = [];

    const q = {
      id: 'csv_' + i,
      type: row.type || 'single',
      question: row.question,
      answer: row.answer,
      explanation: row.explanation || '',
    };

    if (row.options) {
      q.options = row.options.split(';').map(o => o.trim()).filter(o => o);
    }
    if (q.type === 'multi' && typeof q.answer === 'string') {
      q.answer = q.answer.split(';').map(a => a.trim());
    }

    chapMap[chName].push(q);
  }

  return {
    chapters: Object.entries(chapMap).map(([name, questions]) => ({ name, questions }))
  };
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === ',' && !inQuotes) {
      result.push(current); current = '';
    } else {
      current += c;
    }
  }
  result.push(current);
  return result;
}

// === STREAK ===
function getStreak() {
  const results = getAllResults();
  const today = new Date();
  let streak = 0;
  for (let d = 0; d < 365; d++) {
    const check = new Date(today);
    check.setDate(check.getDate() - d);
    const dateStr = check.toISOString().slice(0,10);
    const hasResult = Object.values(results).some(r => r.date === dateStr);
    if (hasResult) streak++;
    else break;
  }
  return streak;
}

// === CONFETTI ===
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#f97316','#22c55e','#3b82f6','#eab308','#ef4444','#a78bfa','#fb923c'];
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      w: 4 + Math.random() * 6,
      h: 8 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      opacity: 1,
    });
  }
  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rot += p.rotV;
      if (frame > 60) p.opacity -= 0.008;
      if (p.opacity > 0 && p.y < canvas.height + 50) {
        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
    });
    frame++;
    if (alive) requestAnimationFrame(animate);
    else canvas.remove();
  }
  animate();
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', (e) => {
  // Esc closes modals
  if (e.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) { modal.remove(); return; }
  }
  // ? shows shortcut help (when not in input)
  if (e.key === '?' && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'TEXTAREA') {
    showShortcutHelp();
    return;
  }
  if (APP.currentView !== 'exam') return;
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;
  const q = APP.dailyQuestions[APP.currentQ];
  if (!APP.submitted) {
    // 1-4 or A-D for options
    const keyMap = {'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
    if (keyMap[e.key.toLowerCase()] && q.type !== 'fill') {
      const val = keyMap[e.key.toLowerCase()];
      if (q.type === 'tf') {
        const tfMap = {'A':'true','B':'false','1':'true','2':'false'};
        if (tfMap[val]) {
          APP.answers[APP.currentQ] = tfMap[val];
          renderExam();
        }
      } else if (q.type === 'multi') {
        let arr = APP.answers[APP.currentQ] || [];
        if (!Array.isArray(arr)) arr = [];
        if (arr.includes(val)) arr = arr.filter(v => v !== val);
        else arr.push(val);
        APP.answers[APP.currentQ] = arr.sort();
        renderExam();
      } else {
        if (q.options && parseInt(val.charCodeAt(0) - 65) < q.options.length) {
          APP.answers[APP.currentQ] = val;
          renderExam();
        }
      }
      return;
    }
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (APP.currentQ > 0) { APP.currentQ--; renderExam(); }
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (APP.currentQ < APP.dailyQuestions.length - 1) { APP.currentQ++; renderExam(); }
  } else if (e.key === 'f' || e.key === 'F') {
    if (!APP.submitted) {
      if (APP.flags.has(APP.currentQ)) APP.flags.delete(APP.currentQ);
      else APP.flags.add(APP.currentQ);
      renderExam();
    }
  } else if (e.key === 'Enter' && e.ctrlKey && !APP.submitted) {
    submitExam();
  }
});

let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  if (APP.currentView !== 'exam') return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (APP.currentView !== 'exam') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // Only trigger for horizontal swipes
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0 && APP.currentQ < APP.dailyQuestions.length - 1) {
      APP.currentQ++;
      renderExam();
    } else if (dx > 0 && APP.currentQ > 0) {
      APP.currentQ--;
      renderExam();
    }
  }
}, { passive: true });

// === SOUND ===
function playSound(type) {
  if (!getSetting('sound', true)) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.value = 0.08;
    if (type === 'correct') {
      osc.frequency.value = 523.25; // C5
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
      // Second note
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 659.25; // E5
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0.08, ctx.currentTime + 0.12);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc2.start(ctx.currentTime + 0.12);
      osc2.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.06, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } else if (type === 'click') {
      osc.frequency.value = 800;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.05);
    } else if (type === 'pomodoroComplete') {
      osc.frequency.value = 440;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 554.37;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0.1, ctx.currentTime + 0.2);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
      osc2.start(ctx.currentTime + 0.2);
      osc2.stop(ctx.currentTime + 0.7);
      const osc3 = ctx.createOscillator();
      const gain3 = ctx.createGain();
      osc3.connect(gain3); gain3.connect(ctx.destination);
      osc3.frequency.value = 659.25;
      osc3.type = 'sine';
      gain3.gain.setValueAtTime(0.1, ctx.currentTime + 0.4);
      gain3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
      osc3.start(ctx.currentTime + 0.4);
      osc3.stop(ctx.currentTime + 0.9);
    }
  } catch {}
}

// === ROUND 7: GET QUESTION DIFFICULTY ===
function getQuestionDifficulty(qId) {
  const data = getStorage();
  const wrongBook = data.wrongBook || [];
  const count = wrongBook.filter(w => w.id === qId).length;
  // Factor in per-question stats
  const stats = getQuestionStats();
  const s = stats[qId];
  let statScore = 0;
  if (s && s.seen >= 2) {
    const pct = s.correct / s.seen;
    if (pct < 0.4) statScore = 2;
    else if (pct < 0.7) statScore = 1;
  }
  const combined = count + statScore;
  if (combined >= 3) return { label: '困难', cls: 'hard' };
  if (combined >= 1) return { label: '中等', cls: 'medium' };
  return { label: '简单', cls: 'easy' };
}

// === ROUND 7: EXAM HISTORY REPLAY ===
function showHistoryReplay(chapterIdx, day) {
  if (!APP.bank || !APP.bank.chapters[chapterIdx]) return;
  const ch = APP.bank.chapters[chapterIdx];
  const results = getAllResults();
  const key = `ch${chapterIdx}_d${day}`;
  const r = results[key];
  if (!r) return;

  // Reconstruct questions using seed
  const seed = day * 1000 + chapterIdx * 137 + 42;
  const rng = seededRandom(seed);
  const pool = [...ch.questions];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const questions = pool.slice(0, Math.min(10, pool.length));

  // Try to find saved user answers for this day from wrongBook
  const data = getStorage();
  const wrongBook = data.wrongBook || [];
  const dayWrong = {};
  wrongBook.forEach(w => {
    if (w.date === r.date) {
      dayWrong[w.id] = w.userAnswer;
    }
  });

  const pct = Math.round(r.score / r.total * 100);
  const typeMap = { single: '单选', multi: '多选', tf: '判断', fill: '填空' };

  let detailHtml = '';
  questions.forEach((q, i) => {
    const userAns = dayWrong[q.id];
    const correctAns = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
    const userAnsDisplay = userAns ? (Array.isArray(userAns) ? userAns.join(', ') : userAns) : null;
    // Determine if correct - if we have a user wrong answer it was wrong, otherwise assume correct
    const wasWrong = dayWrong.hasOwnProperty(q.id);

    detailHtml += `
    <div style="padding:14px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="q-type-badge ${q.type}">${typeMap[q.type] || q.type}</span>
        <span style="font-size:0.75rem;font-weight:600;color:${wasWrong ? 'var(--red)' : 'var(--green)'}">
          ${wasWrong ? '&#10007; 错误' : '&#10003; 正确'}
        </span>
        <span style="font-size:0.72rem;color:var(--text-muted);margin-left:auto">第 ${i+1} 题</span>
      </div>
      <div style="font-size:0.9rem;line-height:1.6;margin-bottom:8px">${escHtml(q.question)}</div>
      <div style="display:flex;gap:16px;font-size:0.82rem;flex-wrap:wrap">
        ${userAnsDisplay !== null ? `<div><span style="color:var(--text-muted)">你的答案：</span><span style="color:${wasWrong ? 'var(--red)' : 'var(--green)'};font-weight:600">${escHtml(String(userAnsDisplay))}</span></div>` : ''}
        <div><span style="color:var(--text-muted)">正确答案：</span><span style="color:var(--green);font-weight:600">${escHtml(String(correctAns))}</span></div>
      </div>
    </div>`;
  });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box" style="max-width:640px;max-height:85vh">
    <div class="modal-title">
      <span>&#128209; Day ${day+1} 详情 — ${escHtml(ch.name)}</span>
      <button class="modal-close">&times;</button>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;font-size:0.85rem">
      <div><span style="color:var(--text-muted)">日期：</span>${r.date || '-'}</div>
      <div><span style="color:var(--text-muted)">得分：</span><span style="font-weight:700;color:${pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)'}">${r.score}/${r.total} (${pct}%)</span></div>
      <div><span style="color:var(--text-muted)">用时：</span>${formatTime(r.elapsed || 0)}</div>
    </div>
    <div style="border-top:1px solid var(--border)">
      ${detailHtml}
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// === ROUND 7: BOOKMARK PRACTICE ===
function startBookmarkPractice() {
  const bmarks = getBookmarks();
  if (bmarks.length === 0) {
    showToast('暂无收藏题目');
    return;
  }
  let pool = [];
  APP.bank.chapters.forEach((ch, ci) => {
    ch.questions.forEach(q => {
      if (bmarks.includes(q.id)) {
        pool.push({...q, _chapterName: ch.name, _chapterIdx: ci});
      }
    });
  });
  if (pool.length === 0) {
    showToast('收藏的题目在当前题库中未找到');
    return;
  }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const count = Math.min(pool.length, 20);
  APP.currentChapter = -4; // marker for bookmark practice
  APP.dailyQuestions = pool.slice(0, count);
  APP.currentQ = 0;
  APP.answers = {};
  APP.flags = new Set();
  APP.submitted = false;
  APP.currentView = 'exam';
  APP.elapsed = 0;
  APP.isRandomMode = false;
  APP.isWrongPractice = false;
  APP.timedMode = false;
  startTimer();
  renderExam();
}

// === ROUND 8: Share Card (Canvas) ===
function generateShareCard() {
  const questions = APP.dailyQuestions;
  const total = questions.length;
  const score = questions.reduce((s, _, i) => s + (isCorrect(i) ? 1 : 0), 0);
  const pct = Math.round(score / total * 100);
  const isRandom = APP.currentChapter === -1;
  const isWrongPractice = APP.currentChapter === -2;
  const isCustomBuilder = APP.currentChapter === -3;
  const isBookmarkPractice = APP.currentChapter === -4;
  const isWeakPractice = APP.currentChapter === -5;
  const chName = isRandom ? '随机练习' : isWrongPractice ? '错题重练' : isCustomBuilder ? '自定义组卷' : isBookmarkPractice ? '收藏练习' : isWeakPractice ? '针对性练习' : APP.bank.chapters[APP.currentChapter].name;
  const dateStr = new Date().toISOString().slice(0, 10);

  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 400;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 600, 400);
  bg.addColorStop(0, '#0a0e17');
  bg.addColorStop(1, '#1a2234');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 600, 400);

  // Decorative accent stripe
  const stripe = ctx.createLinearGradient(0, 0, 600, 0);
  stripe.addColorStop(0, '#f97316');
  stripe.addColorStop(1, '#f59e0b');
  ctx.fillStyle = stripe;
  ctx.fillRect(0, 0, 600, 5);

  // Title
  ctx.fillStyle = '#f97316';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('大钦智能刷题', 40, 55);
  ctx.fillStyle = '#8892a8';
  ctx.font = '14px sans-serif';
  ctx.fillText('每日模拟练习平台 v1.0', 190, 55);

  // Score circle
  const cx = 300, cy = 190, r = 70;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#1f2a40';
  ctx.lineWidth = 10;
  ctx.stroke();

  const ringColor = pct >= 80 ? '#22c55e' : pct >= 60 ? '#eab308' : '#ef4444';
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * pct / 100));
  ctx.strokeStyle = ringColor;
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Score text
  ctx.fillStyle = ringColor;
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(pct + '%', cx, cy + 10);
  ctx.fillStyle = '#8892a8';
  ctx.font = '14px sans-serif';
  ctx.fillText(score + ' / ' + total, cx, cy + 32);

  // Stats
  ctx.textAlign = 'left';
  ctx.font = '14px sans-serif';
  const statsY = 300;
  ctx.fillStyle = '#22c55e';
  ctx.fillText('正确: ' + score, 80, statsY);
  ctx.fillStyle = '#ef4444';
  ctx.fillText('错误: ' + (total - score), 200, statsY);
  ctx.fillStyle = '#e8ecf4';
  ctx.fillText('总题: ' + total, 320, statsY);
  ctx.fillStyle = '#f97316';
  ctx.fillText('用时: ' + formatTime(APP.elapsed), 440, statsY);

  // Chapter name & date
  ctx.fillStyle = '#8892a8';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(chName + '  ·  ' + dateStr, 300, 345);

  // Footer
  ctx.fillStyle = '#5a6478';
  ctx.font = '11px sans-serif';
  ctx.fillText('— 大钦智能刷题 · 每日坚持，稳步提升 —', 300, 380);

  // Show modal
  const dataUrl = canvas.toDataURL('image/png');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box" style="max-width:640px">
    <div class="modal-title">
      <span>&#127912; 分享成绩卡</span>
      <button class="modal-close">&times;</button>
    </div>
    <div class="share-card-modal">
      <img src="${dataUrl}" alt="成绩卡">
      <div>
        <a class="btn btn-primary" id="share-download" download="大钦智能刷题_成绩_${dateStr}.png" href="${dataUrl}">&#128229; 下载图片</a>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// === ROUND 8: Color Accent Themes ===
const ACCENT_THEMES = {
  orange:  { accent: '#f97316', glow: 'rgba(249,115,22,0.25)', secondary: '#fb923c' },
  blue:    { accent: '#3b82f6', glow: 'rgba(59,130,246,0.25)', secondary: '#60a5fa' },
  purple:  { accent: '#8b5cf6', glow: 'rgba(139,92,246,0.25)', secondary: '#a78bfa' },
  green:   { accent: '#10b981', glow: 'rgba(16,185,129,0.25)', secondary: '#34d399' },
  rose:    { accent: '#f43f5e', glow: 'rgba(244,63,94,0.25)',  secondary: '#fb7185' },
};
function applyAccentTheme(theme) {
  const t = ACCENT_THEMES[theme];
  if (!t) return;
  const root = document.documentElement;
  root.style.setProperty('--accent', t.accent);
  root.style.setProperty('--accent-glow', t.glow);
  root.style.setProperty('--accent-secondary', t.secondary);
  saveSetting('accentTheme', theme);
}
function initAccentTheme() {
  const theme = getSetting('accentTheme', 'orange');
  applyAccentTheme(theme);

function exportBackup() {

    if (_dataCache[key]) backup[key] = _dataCache[key];
  });
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '大钦智能刷题_备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
